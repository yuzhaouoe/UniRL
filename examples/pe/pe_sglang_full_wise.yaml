# @package _global_
# PE joint trainer — WISE reward variant (composed_pe DUAL-ENGINE sglang).
#
# Same two-track PE recipe as pe_trainside_pickscore.yaml, but the rollout is a
# ComposedRolloutEngine driving TWO separate-process SGLang engines:
#   - ar:        SGLangRolloutEngine (Qwen3 SRT)   → P*N rewrites
#   - diffusion: SGLangDiffusionRolloutEngine    (SD3 sglang)  → P*N*M images
# Trained weights reach each engine via a per-track sync bridge, routed to the
# matching child of the composed engine by ``track_prefix``:
#   - diffusion: LocalLoraWeightSync           → set_lora_from_tensors (SD3 sglang LoRA pool)
#   - ar:        TensorWeightSync lora_merged  → fold base+(α/r)·B·A → /update_weights_from_tensor
#                              (full-weight-sync path; bypasses SGLang LLM LoRA pool)
# Sync runs every ``weight_sync_interval`` rollouts (skip step 0).
#
# Pairs with unirl/train_pe.py:
#   python -m unirl.train_pe --config-name pe/pe_sglang_full_wise
#
# Format mirrors examples/pe/pe_trainside_pickscore.yaml (v2). Set checkpoint paths via
# the PRETRAINED_MODEL / LLM_MODEL env vars (see ${oc.env:...} defaults below).
#
# batch_size MUST be divisible by num_devices — the composed rollout dispatches
# generate DP_SCATTER (Handle shards P across DP workers, then merges the per-worker
# resps). Default P=8 on 8 GPUs → 1 prompt/worker × N=2 × M=2.
# 1-GPU wiring smoke (bypasses the multi-GPU DP merge entirely — dp_size=1 returns
# the single worker's resp with no cross-worker concat):
#   python -m unirl.train_pe --config-name pe/pe_sglang_full_wise num_devices=1 ++devices_per_node=1 batch_size=2 num_rollouts=3
# Scale toward the v1 e2e (P=8 N=4 M=4) once green.
#
# VERIFY at smoke (engine-specific, can't be unit-checked):
#   1. AR merged-weight keys accepted by SGLang LLM /update_weights_from_tensor
#      — sync.ar leaves name_remap unset (identity) → bare HF-native keys
#      (model.layers.*), which is what the LLM expects (a "transformer." nesting mis-keys it).
#   2. SGLang diffusion LoRA target-module names (diffusion.bundle...lora_target_modules).
#   3. per-engine mem_fraction_static budget on the colocated GPU.

num_devices: 8
batch_size: 8                 # P; MUST be divisible by num_devices (composed rollout = DP_SCATTER)

# LoRA weight-sync cadence (read by PETrainer.train): push each track's adapter
# into its engine every N rollouts. 1 = on-policy. Step 0 is skipped.
weight_sync_interval: 1
num_rollouts: 300

# Offload both tracks' FSDP train state to CPU during generate (separate-engine
# recipe only; trainside leaves it off — it samples the live FSDP modules).
enable_fsdp_offload: true

# ── Diffusion side (SD3) — copied from pe_trainside_pickscore.yaml ───────────────────
diffusion:
  bundle:
    _target_: unirl.models.sd3.bundle.SD3Bundle.from_config
    config:
      _target_: unirl.models.sd3.config.SD3PipelineConfig
      pretrained_model_ckpt_path: ${oc.env:PRETRAINED_MODEL,stabilityai/stable-diffusion-3.5-medium}
      model_precision: bf16
      shift: 3.0
      load_vae: false
      # SGLang diffusion rollout boots in (online) LoRA mode and wraps these
      # modules. Trainside ignores these hints (FSDPBackend.lora_cfg injects
      # the same target set). model_config is shared with the rollout via
      # ``rollout.model_config: ${diffusion.bundle.config}``.
      use_lora: true
      lora_target_modules:
        - attn.add_k_proj
        - attn.add_q_proj
        - attn.add_v_proj
        - attn.to_add_out
        - attn.to_k
        - attn.to_out.0
        - attn.to_q
        - attn.to_v
  pipeline:
    _target_: unirl.models.sd3.pipeline.SD3Pipeline
    shift: 3.0
    autocast_precision: bf16
    trajectory_precision: bf16
    logprob_precision: fp32
    strategy:
      _target_: unirl.sde.kernels.FlowSDEStrategy
  backend:
    _target_: unirl.train.backend.fsdp.FSDPBackend
    block_class_names: ["JointTransformerBlock"]
    trainable_attr: transformer
    fsdp_cfg:
      _target_: unirl.train.configs.FSDPConfig
      param_dtype: bf16
      cpu_offload: false
      mixed_precision: true
      fsdp_mode: full
      reshard_after_forward: true
      activation_checkpointing: false
      use_torch_compile: false
    optimizer_cfg:
      _target_: unirl.train.backend.base.OptimizerConfig
      learning_rate: 3.0e-4
      adam_beta1: 0.9
      adam_beta2: 0.999
      adam_epsilon: 1.0e-8
      weight_decay: 0.0
    scheduler_cfg:
      _target_: unirl.train.backend.base.LrSchedulerConfig
      type: constant
      warmup_steps: 0
      total_steps: 10000
    lora_cfg:
      _target_: unirl.train.configs.LoraConfig
      rank: 16
      alpha: 32
      dropout: 0.0
      bias: none
      task_type: FEATURE_EXTRACTION
      target_modules:
        - attn.add_k_proj
        - attn.add_q_proj
        - attn.add_v_proj
        - attn.to_add_out
        - attn.to_k
        - attn.to_out.0
        - attn.to_q
        - attn.to_v
  algorithm:
    _target_: unirl.algorithms.flowgrpo.FlowGRPO
    stage_attr: diffusion
    clip_range: 1.0e-4
    clip_schedule: constant
    # REPLAY: SGLang separate-worker rollout — recompute the diffusion π_old
    # anchor trainer-side (restores the pre-#243 engine default for these PE
    # recipes; avoids the fork-vs-replay engine gap in the GRPO ratio).
    old_logp_source: replay
    conditions_cls:
      _target_: hydra.utils.get_class
      path: unirl.models.sd3.conditions.SD3Conditions
    params: ${sampling.diffusion}
  stack:
    _target_: unirl.train.stack.TrainStack
    micro_batch_size: 1
    max_grad_norm: 1.0
    num_updates_per_batch: 2      # diffusion-side PPO mini-batches; ar stays 1 (GRPO is single-update only)

# ── AR side (Qwen3) — copied from pe_trainside_pickscore.yaml ────────────────────────
ar:
  bundle:
    _target_: unirl.models.qwen3.bundle.Qwen3Bundle.from_config
    config:
      _target_: unirl.models.qwen3.config.Qwen3PipelineConfig
      pretrained_model_ckpt_path: ${oc.env:LLM_MODEL,Qwen/Qwen3-0.6B}
      model_precision: bf16
  pipeline:
    _target_: unirl.models.qwen3.pipeline.Qwen3Pipeline
    autocast_precision: bf16
    logprob_precision: fp32
  backend:
    _target_: unirl.train.backend.fsdp.FSDPBackend
    block_class_names: ["Qwen3DecoderLayer"]   # VERIFY at smoke: HF Qwen3 decoder-layer class
    trainable_attr: transformer
    fsdp_cfg:
      _target_: unirl.train.configs.FSDPConfig
      param_dtype: bf16
      cpu_offload: false
      mixed_precision: true
      fsdp_mode: full
      reshard_after_forward: true
      activation_checkpointing: false
      use_torch_compile: false
    optimizer_cfg:
      _target_: unirl.train.backend.base.OptimizerConfig
      learning_rate: 5.0e-6      # v1 e2e value (GRPO ratio is update-sensitive)
      adam_beta1: 0.9
      adam_beta2: 0.999
      adam_epsilon: 1.0e-8
      weight_decay: 0.0
    scheduler_cfg:
      _target_: unirl.train.backend.base.LrSchedulerConfig
      type: constant
      warmup_steps: 0
      total_steps: 10000
    lora_cfg:
      _target_: unirl.train.configs.LoraConfig
      rank: 16
      alpha: 32
      dropout: 0.0
      bias: none
      task_type: CAUSAL_LM
      target_modules: [q_proj, k_proj, v_proj, o_proj]
  algorithm:
    _target_: unirl.algorithms.grpo.GRPO
    stage_attr: ar
    clip_range: 1.0e-2 # AR track — diffusion track above keeps 1e-4
    clip_schedule: constant
    conditions_cls:
      _target_: hydra.utils.get_class
      path: unirl.models.qwen3.conditions.Qwen3ARConditions
  stack:
    _target_: unirl.train.stack.TrainStack
    micro_batch_size: 1
    max_grad_norm: 1.0

# ── Composed dual-engine rollout: sglang (ar) + sglang (diffusion) ──────
rollout:
  _target_: unirl.rollout.engine.composed.engine.ComposedRolloutEngine
  # The diffusion child needs the SD3 model_config (path + shift + LoRA hints);
  # the ar child receives it but ignores it (uses its own ckpt path).
  model_config: ${diffusion.bundle.config}
  # SDE strategy → SGLang kernel label for the diffusion child (flow → "sde").
  strategy:
    _target_: unirl.sde.kernels.FlowSDEStrategy
  config:
    _target_: unirl.rollout.engine.composed.config.ComposedRolloutEngineConfig
    sleep_diffusion_on_start: false
    pe_instruction: |
      You are a Prompt Optimizer for text-to-image models (e.g. Stable Diffusion, MidJourney). Rewrite the user's prompt into a single vivid, easy-to-render English description.
      Guidelines:
      - Preserve the user's original intent; never add unrelated content.
      - Describe the final visual scene: the main subject and its shape, color and state, plus setting, composition, lighting and style.
      - Turn abstract or technical concepts into concrete visual details.
      - Keep it to one concise paragraph, no lists or commentary.
      After reasoning, output the rewritten prompt in the fixed format "Revised Prompt:"
      followed by the rewritten prompt on the next line.
    # Marker: _extract_pe_text strips the LLM's <think> reasoning preamble and takes the
    # text after the marker before the cleaned PE text feeds diffusion (decoded itself
    # stays raw for reward/logging). An empty marker + a thinking LLM would leak <think>
    # into the diffusion prompt, so pin the marker like the pickscore recipes; off-format
    # / empty outputs fall back to the original user prompt.
    pe_marker: "Revised Prompt:"
    ar:
      _target_: unirl.rollout.engine.sglang.config.SGLangEngineConfig
      backend: native
      pretrained_model_ckpt_path: ${oc.env:LLM_MODEL,Qwen/Qwen3-0.6B}
      tp_size: 1
      max_new_tokens: 1024          # headroom for Qwen3 <think> + the revised prompt
      temperature: 0.7
      top_p: 0.9
      concurrency: 4
      engine_kwargs:
        mem_fraction_static: 0.25
        skip_server_warmup: true
        disable_cuda_graph: false
        attention_backend: triton
        # Make this colocated SRT engine's sleep() actually free GPU (KV +
        # weights→CPU); without both it is a silent no-op.
        enable_memory_saver: true
        enable_weights_cpu_backup: true
        # This config syncs AR via full-weight-sync merge (sync.ar =
        # TensorWeightSync lora_merged): /update_weights_from_tensor, never
        # set_lora → no LoRA pool needed here. The LoRA-pool variant lives in
        # pe_sglang_lora_pickscore.yaml (enable_lora: true + the two knobs below).
        enable_lora: false
        # max_lora_rank: 16
        # lora_target_modules: [q_proj, k_proj, v_proj, o_proj]
    diffusion:
      _target_: unirl.rollout.engine.sglang_diffusion.config.SGLangDiffusionEngineConfig
      model_family: sd3
      tp_size: 1
      local_mode: true
      sampling: ${sampling.diffusion}
      # The diffusion stage runs at P*N*M samples (the largest fan-out in PE).
      # Chunk generate into 4-sample sub-batches (= diffusion.samples_per_prompt)
      # so sglang bounds its DiT-forward / VAE-decode peak memory.
      forward_batch_size: 4
      engine_kwargs:
        # multimodal_gen sglang has torch_memory_saver on by default → its sleep
        # already frees; no knob needed here.
        mem_fraction_static: 0
        skip_server_warmup: true
        disable_cuda_graph: true
        attention_backend: torch_sdpa

reward:
  # WISE reward via remote RewardService: one HTTP POST /score per rollout.
  # The `wise` scorer (Qwen3.5-VL judge) returns wiscore=(0.7C+0.2R+0.1A)/2 as its
  # first sub-metric; sub_metric_reduce="first" trains on that headline score.
  # The judge sees the ORIGINAL user prompt (req.primitives['text'], not the AR
  # rewrite), replicated N*M → scores image-vs-original-intent.
  _target_: unirl.reward.service.RewardService
  backend:
    _target_: unirl.reward.remote.RemoteRewardBackend
    base_device: cpu                       # HTTP-only; device ignored
    config:
      _target_: unirl.reward.remote.RemoteRewardSpec
      base_url: ${oc.env:REWARD_SERVICE_URL,http://localhost:8080}
      required_rewards: [wise]
      sub_metric_reduce: first             # -> wiscore (wise's first sub-metric)
      aggregation_method: weighted_sum     # single reward -> passthrough
      batch_size: 8
      timeout: 900.0                       # > RewardService score_timeout_s; covers VLM cold start
      input_kind: image
      raise_on_failure: true

data_source:
  # Real WISE prompts from disk (DefaultDataSource only has hardcoded toy prompts).
  # MultimodalRLDataSource reads args.run.data_path; prompts_per_rollout MUST equal
  # batch_size (its get_samples ignores the batch_size arg, yields prompts_per_rollout).
  # Default prompt set under datasets/wise/; override via DATA_PATH / EVAL_DATA_PATH.
  _target_: unirl.data.data_source.MultimodalRLDataSource
  args:
    run:
      data_path: ${oc.env:DATA_PATH,datasets/wise/train.txt}
      eval_data_path: ${oc.env:EVAL_DATA_PATH,datasets/wise/test.txt}
      seed: 42
    algorithm:
      prompts_per_rollout: ${batch_size}

# Modality-keyed sampling dict drives PEPipeline's fan-out: ar.samples_per_prompt = N
# rewrites, diffusion.samples_per_prompt = M images per rewrite.
sampling:
  ar:
    _target_: unirl.types.sampling.ARSamplingParams
    samples_per_prompt: 4       # N rewrites per prompt
    temperature: 0.7
    max_new_tokens: 1024         # headroom for Qwen3 <think> + the revised prompt
    top_p: 0.9
    top_k: 1024
  diffusion:
    _target_: unirl.types.sampling.DiffusionSamplingParams
    samples_per_prompt: 4       # M images per rewrite
    num_inference_steps: 10
    guidance_scale: 4.5
    height: 512
    width: 512
    eta: 0.7
    seed: 42
    init_same_noise: false
    autocast_precision: bf16
    sde_indices: [1, 3]   # SDE (stochastic, eta=0.7) only on the 4 high-σ early steps; steps 4-9 run deterministic ODE → cleaner rollout images. GRPO trains on these 4.

# ── Per-track LoRA weight-sync bridges (PETrainer builds one each) ──────────
# Each pushes its track's trained LoRA into the matching composed-engine child,
# routed by ``track_prefix``. ``verify`` is vLLM-Omni-only → false for SGLang.
sync:
  diffusion:
    _target_: unirl.distributed.weight_sync.lora.LocalLoraWeightSync
    track_prefix: diffusion
    # Stripped engine-side by adapt_lora_for_sglang (reads model_config
    # .weight_sync_param_name_prefix == "transformer.").
    param_prefix: "transformer."
    adapter_name: default
    verify: false
  ar:
    # Full-weight-sync merge: TensorWeightSync with lora_merged folds the trained
    # LoRA delta into the base and pushes the merged FULL weights via the
    # tensor-payload family (NOT via LocalLoraWeightSync, which stays adapter/RPC-only).
    _target_: unirl.distributed.weight_sync.full.tensor.TensorWeightSync
    track_prefix: ar            # route to the AR child of the ComposedRolloutEngine
    lora_merged: true           # fold base+(α/r)·B·A → push the merged FULL weights
    # sglang wants bare HF-native keys (model.layers.*) → leave name_remap unset
    # (identity), so keys pass through bare. A "transformer." nesting would mis-key
    # the LLM update (suspected cause of the ar_spo TensorWeightSync ~0.2 plateau).
    flush_cache: true
    bucket_size_mb: 512         # splits the ~1.2GB Qwen3-0.6B push into size-bounded buckets

# ── W&B logging — read via env; the launcher (run_experiment_single_node.sh)
# exports REPORT_TO_WANDB / WANDB_PROJECT / WANDB_RUN_NAME / WANDB_ENTITY.
# NOTE: the base PE recipe has NO logging block (wandb stays off); this
# WISE variant adds one so BaseTrainer._init_wandb actually opens a run — it
# no-ops unless report_to_wandb=true AND project_name is set.
logging:
  report_to_wandb: ${oc.decode:${oc.env:REPORT_TO_WANDB,true}}
  project_name: ${oc.env:WANDB_PROJECT,diffusion-pe-wise}
  run_name: ${oc.env:WANDB_RUN_NAME,pe_sglang_full_wise}
  entity: ${oc.env:WANDB_ENTITY,null}
  tags: ["pe", "wise", "sglang", "full"]
