# @package _global_
# DanceGRPO WAN 2.1 T2V with the FastVideo rollout engine, colocate, v2 trainer, 1x8.
#
# This is wan21_t2v_dancegrpo.yaml with ONLY the rollout swapped from the
# in-process trainside engine to the dedicated FastVideo VideoGenerator engine
# (+ the weight-sync block a dedicated engine requires). Everything else — 720p/
# 5-frame video shape, UMT5, video_pickscore reward, LoRA targets, DanceGRPO
# Dance SDE kernel, replay log-prob, sampling schedule — is unchanged from the
# official recipe.
#
# Two structural deltas the swap forces:
#   1. A dedicated engine needs `model_config` + `strategy` injected, so the
#      inline bundle.config / pipeline.strategy are lifted into shared nodes.
#   2. A dedicated engine requires a `sync:` block. We use CheckpointWeightSync
#      (torch.save full weights -> engine load). Because the official recipe is a
#      LoRA run, sync.lora_merged=true folds the trained LoRA delta into the base
#      weights and pushes the merged full model (FastVideo serves merged weights;
#      it has no separate adapter path here).
#
# FastVideo dependency: https://github.com/Zcchill/FastVideo at or after
# 7fe1d7db9a0b8aebb46679e7924f597431f23665. Set $FASTVIDEO_PATH to that
# checkout; FastVideo is lazy-imported by the rollout engine only.
#
# This recipe defaults to replay log-probs. Native mode is enabled by setting
# rollout.config.native_logprob=true and algorithm.old_logp_source=rollout;
# both modes use the same SDE sampling window.

num_devices: 8                # 1 node x 8 GPUs
batch_size: 48                # prompts_per_rollout
adv_use_global_std: true     # advantage: divide by ONE batch-wide std (v1 parity), not per-group
num_rollouts: 1000
weight_sync_interval: 1      # push freshly-trained weights into FastVideo every rollout (on-policy)

# Shared nodes (lifted from the trainside recipe so the dedicated FastVideo
# engine can be injected with the same model config + SDE kernel).
model_config:
  _target_: unirl.models.wan21.config.WAN21PipelineConfig
  pretrained_model_ckpt_path: ${oc.env:PRETRAINED_MODEL,Wan-AI/Wan2.1-T2V-1.3B-Diffusers}
  model_precision: bf16
  # Match wan21_t2v_dancegrpo.yaml exactly. The FastVideo engine now sets its
  # pipeline flow_shift from this value and pre-images custom sigmas before
  # FastVideo reapplies the shift, so rollout and trainer both consume shift=5.
  shift: 5.0
  max_sequence_length: 512
  # FastVideo owns video decoding; the trainer-side pipeline only replays the
  # returned latent trajectory and does not need a duplicate VAE on the same GPU.
  load_vae: false
  # LoRA is configured via backend.lora_cfg only (faithful to the official
  # wan21_t2v_dancegrpo recipe — bundle.config sets no use_lora). The
  # lora_merged sync reads backend.model's adapters, not this node, and
  # FastVideo serves the merged full weights, so no engine-side LoRA flag.

strategy:
  _target_: unirl.sde.kernels.DanceSDEStrategy

bundle:
  _target_: unirl.models.wan21.bundle.WAN21Bundle.from_config
  config: ${model_config}

pipeline:
  _target_: unirl.models.wan21.pipeline.WAN21Pipeline
  shift: 5.0
  autocast_precision: bf16
  trajectory_precision: fp16
  logprob_precision: fp32
  max_sequence_length: 512
  strategy: ${strategy}

backend:
  _target_: unirl.train.backend.fsdp.FSDPBackend
  block_class_names: ["WanTransformerBlock"]
  trainable_attr: transformer
  fsdp_cfg:
    _target_: unirl.train.configs.FSDPConfig
    param_dtype: bf16
    cpu_offload: false
    mixed_precision: true
    fsdp_mode: full
    reshard_after_forward: true
    activation_checkpointing: true   # required for the 1x8 720p configuration
    use_torch_compile: false
  optimizer_cfg:
    _target_: unirl.train.backend.base.OptimizerConfig
    learning_rate: 3.0e-4
    adam_beta1: 0.9
    adam_beta2: 0.999
    adam_epsilon: 1.0e-8
    weight_decay: 0.0
  scheduler_cfg:
    _target_: unirl.train.backend.base.LrSchedulerConfig
    type: constant
    warmup_steps: 0
    total_steps: 1000               # v1 constant_1k
  lora_cfg:
    _target_: unirl.train.configs.LoraConfig
    rank: 64
    alpha: 128
    dropout: 0.0
    bias: none
    task_type: FEATURE_EXTRACTION
    # WAN transformer attention (self attn1 + cross attn2). v1's generic
    # q_proj/k_proj default matched nothing here.
    target_modules:
      - attn1.to_q
      - attn1.to_k
      - attn1.to_v
      - attn1.to_out.0
      - attn2.to_q
      - attn2.to_k
      - attn2.to_v
      - attn2.to_out.0

# Rollout swapped: trainside -> FastVideo VideoGenerator (dedicated, colocate).
rollout:
  _target_: unirl.rollout.engine.fastvideo.engine.FastVideoRolloutEngine
  config:
    _target_: unirl.rollout.engine.fastvideo.config.FastVideoEngineConfig
    model_family: wan2.1
    # replay recipe: engine returns the trajectory, trainer recomputes log-probs.
    # Flip to true (+ algorithm.old_logp_source: rollout) for the native path.
    native_logprob: false
    init_same_noise: ${sampling.init_same_noise}
    num_gpus: 1
    tp_size: 1
    sp_size: 1
    local_mode: true
    forward_batch_size: 4           # CPU-output concat cadence (NOT a GPU batch: the
                                    # forward runs one video at a time regardless)
    fastvideo_path: ${oc.env:FASTVIDEO_PATH,null}
  model_config: ${model_config}
  strategy: ${strategy}

reward:
  _target_: unirl.reward.service.RewardService
  backend:
    _target_: unirl.reward.local.video_pickscore.VideoPickScoreScorer
    base_device: cuda
    config:
      _target_: unirl.reward.local.video_pickscore.VideoPickScoreSpec
      batch_size: 8
      device: auto
      processor_id: laion/CLIP-ViT-H-14-laion2B-s32B-b79K
      model_id: yuvalkirstain/PickScore_v1

algorithm:
  _target_: unirl.algorithms.flowgrpo.FlowGRPO
  stage_attr: diffusion
  clip_range: 1.0e-4
  clip_schedule: constant
  old_logp_source: replay
  conditions_cls:
    _target_: hydra.utils.get_class
    path: unirl.models.wan21.conditions.WAN21Conditions
  params: ${sampling}

stack:
  _target_: unirl.train.stack.TrainStack
  micro_batch_size: 1
  max_grad_norm: 1.0
  num_updates_per_batch: 2      # PPO mini-batches per rollout (π_old frozen once); v1 parity

data_source:
  _target_: unirl.data.data_source.MultimodalRLDataSource
  args:
    run:
      data_path: datasets/pickscore/train.txt
      eval_data_path: datasets/pickscore/test.txt
      seed: 42
    algorithm:
      prompts_per_rollout: ${batch_size}

sampling:
  _target_: unirl.types.sampling.DiffusionSamplingParams
  num_inference_steps: 14         # wan21_720p preset
  guidance_scale: 1.0
  height: 720
  width: 1280
  num_frames: 5                   # wan21_720p preset; (num_frames-1)%4==0 required
  eta: 0.7
  samples_per_prompt: 16
  seed: 42
  init_same_noise: false
  # SDE step schedule inherited verbatim from wan21_t2v (DanceGRPO swaps only
  # the kernel, not the schedule).
  scheduler:
    _target_: unirl.utils.scheduler_utils.AllSDEScheduler
    num_timesteps: ${..num_inference_steps}
    timestep_fraction: [0.0, 0.5]   # all steps in first half (num_sde_steps null)
    num_sde_steps: null

# Full-weight checkpoint-path sync -> FastVideo rollout (colocate). backend /
# rollout siblings are framework-injected; only tunables live here. lora_merged
# folds the trained LoRA delta into the pushed base weights (the official recipe
# LoRA-trains but FastVideo serves a merged model).
sync:
  _target_: unirl.distributed.weight_sync.full.checkpoint.CheckpointWeightSync
  lora_merged: true
  sync_dir: ${oc.env:WEIGHT_SYNC_DIR,/tmp/unirl_fastvideo_weight_sync}
  flush_cache: true

logging:
  report_to_wandb: ${oc.decode:${oc.env:REPORT_TO_WANDB,true}}
  project_name: ${oc.env:WANDB_PROJECT,unirl-grpo-t2v}
  run_name: ${oc.env:WANDB_RUN_NAME,wan21_t2v_dancegrpo_fastvideo}
  entity: ${oc.env:WANDB_ENTITY,null}
  tags: ["wan21", "t2v", "dancegrpo", "grpo", "video", "pickscore", "fastvideo", "v2"]
  log_media: false
  media_max_items: 8
  media_log_interval: 1
