# @package _global_
# GRPO WAN 2.1 T2V trainside (FSDP) colocate, v2 trainer, 1x8.
#
# Video FlowGRPO: same trainside shape as sd3_trainside but the WAN 2.1
# T2V pipeline (3D VAE, UMT5 text encoder) + video_pickscore reward.
#
# LoRA targets: v1's recipe inherited the generic `q_proj/k_proj/...` default,
# which matches NOTHING in the WAN transformer (its attn modules are
# `attn1.to_q` etc.) — i.e. v1 injected zero adapters. This recipe uses the
# correct WAN attention targets. Verify on first GPU smoke that
# `[n for n,p in model.named_parameters() if p.requires_grad]` is non-empty.
#
# Data: uses DefaultDataSource (built-in prompts) for out-of-box runs. v1 read
# a prompt dataset via MultimodalRLDataSource + DATA_PATH; swap the data_source
# block if you want those prompts.
# num_updates_per_batch=2 restored (v2 TrainStack multi-update).

num_devices: 8                # 1 node x 8 GPUs
batch_size: 48                # prompts_per_rollout
adv_use_global_std: true     # advantage: divide by ONE batch-wide std (v1 parity), not per-group
num_rollouts: 1000

bundle:
  _target_: unirl.models.wan21.bundle.WAN21Bundle.from_config
  config:
    _target_: unirl.models.wan21.config.WAN21PipelineConfig
    pretrained_model_ckpt_path: ${oc.env:PRETRAINED_MODEL,Wan-AI/Wan2.1-T2V-1.3B-Diffusers}
    model_precision: bf16
    shift: 5.0
    max_sequence_length: 512

pipeline:
  _target_: unirl.models.wan21.pipeline.WAN21Pipeline
  shift: 5.0
  autocast_precision: bf16
  trajectory_precision: fp16
  logprob_precision: fp32
  max_sequence_length: 512
  strategy:
    _target_: unirl.sde.kernels.FlowSDEStrategy

backend:
  _target_: unirl.train.backend.fsdp.FSDPBackend
  block_class_names: ["WanTransformerBlock"]
  trainable_attr: transformer
  fsdp_cfg:
    _target_: unirl.train.configs.FSDPConfig
    param_dtype: bf16
    cpu_offload: false
    mixed_precision: true
    fsdp_mode: full
    reshard_after_forward: true
    activation_checkpointing: false  # deliberately off (speed); v1 used bf16_full_ac
    use_torch_compile: false
  optimizer_cfg:
    _target_: unirl.train.backend.base.OptimizerConfig
    learning_rate: 3.0e-4
    adam_beta1: 0.9
    adam_beta2: 0.999
    adam_epsilon: 1.0e-8
    weight_decay: 0.0
  scheduler_cfg:
    _target_: unirl.train.backend.base.LrSchedulerConfig
    type: constant
    warmup_steps: 0
    total_steps: 1000               # v1 constant_1k
  lora_cfg:
    _target_: unirl.train.configs.LoraConfig
    rank: 64
    alpha: 128
    dropout: 0.0
    bias: none
    task_type: FEATURE_EXTRACTION
    # WAN transformer attention (self attn1 + cross attn2). v1's generic
    # q_proj/k_proj default matched nothing here.
    target_modules:
      - attn1.to_q
      - attn1.to_k
      - attn1.to_v
      - attn1.to_out.0
      - attn2.to_q
      - attn2.to_k
      - attn2.to_v
      - attn2.to_out.0

rollout:
  _target_: unirl.rollout.engine.trainside.engine.TrainsideRolloutEngine
  stage_attrs: [diffusion]
  forward_batch_size: 4           # v1 rollout.plan.forward_batch_size (720p caps activation)

reward:
  _target_: unirl.reward.service.RewardService
  backend:
    _target_: unirl.reward.local.video_pickscore.VideoPickScoreScorer
    base_device: cuda
    config:
      _target_: unirl.reward.local.video_pickscore.VideoPickScoreSpec
      batch_size: 8
      device: auto
      processor_id: laion/CLIP-ViT-H-14-laion2B-s32B-b79K
      model_id: yuvalkirstain/PickScore_v1

algorithm:
  _target_: unirl.algorithms.flowgrpo.FlowGRPO
  stage_attr: diffusion
  clip_range: 1.0e-4
  clip_schedule: constant
  old_logp_source: replay
  conditions_cls:
    _target_: hydra.utils.get_class
    path: unirl.models.wan21.conditions.WAN21Conditions
  params: ${sampling}

stack:
  _target_: unirl.train.stack.TrainStack
  micro_batch_size: 1
  max_grad_norm: 1.0
  num_updates_per_batch: 2      # PPO mini-batches per rollout (π_old frozen once); v1 parity

data_source:
  _target_: unirl.data.data_source.MultimodalRLDataSource
  args:
    run:
      data_path: datasets/pickscore/train.txt
      eval_data_path: datasets/pickscore/test.txt
      seed: 42
    algorithm:
      prompts_per_rollout: ${batch_size}

sampling:
  _target_: unirl.types.sampling.DiffusionSamplingParams
  num_inference_steps: 14         # wan21_720p preset
  guidance_scale: 1.0
  height: 720
  width: 1280
  num_frames: 5                   # wan21_720p preset; (num_frames-1)%4==0 required
  eta: 0.7
  samples_per_prompt: 16
  seed: 42
  init_same_noise: false
  scheduler:
    _target_: unirl.utils.scheduler_utils.AllSDEScheduler
    num_timesteps: ${..num_inference_steps}
    timestep_fraction: [0.0, 0.5]   # v1 algorithm.scheduler; all steps in first half (num_sde_steps null)
    num_sde_steps: null

logging:
  report_to_wandb: ${oc.decode:${oc.env:REPORT_TO_WANDB,true}}
  project_name: ${oc.env:WANDB_PROJECT,unirl-grpo-t2v}
  run_name: ${oc.env:WANDB_RUN_NAME,wan21_t2v}
  entity: ${oc.env:WANDB_ENTITY,null}
  tags: ["wan21", "t2v", "grpo", "video", "pickscore", "v2"]
  # Video media logging is not wired in the minimal v2 trainer's media preview;
  # keep off to avoid a logging-path error. Metrics still log.
  log_media: false
  media_max_items: 8
  media_log_interval: 1
