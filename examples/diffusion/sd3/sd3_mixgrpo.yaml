# @package _global_
# MixGRPO SD3.5 trainside (FSDP) colocate, v2 trainer, 2x8.
#
# MixGRPO = FlowGRPO + Flow SDE + a progressive sliding-window SDE-index
# scheduler. The only difference from sd3_trainside (FlowGRPO) is the scheduler:
#   AllSDEScheduler -> WindowScheduler(strategy=progressive), plus init_same_noise.
#
# Faithful to v1 base flowgrpo_fast_sd3_trainside: activation_checkpointing OFF
# (bf16_full_noac), forward_batch_size 8, micro_batch_size 8, init_same_noise true;
# weight_decay 1e-4 (mixgrpo override).
# num_updates_per_batch=2 restored (v2 TrainStack multi-update). Not carried over:
# algorithm.skip_last_timestep (legacy-only, no v2 equivalent), full-model eval EMA (decay 0.99).

num_devices: 16               # 2 nodes x 8 GPUs (v1 actor_count 16)
batch_size: 48                # prompts_per_rollout
adv_use_global_std: true     # advantage: divide by ONE batch-wide std (v1 parity), not per-group
num_rollouts: 10000

bundle:
  _target_: unirl.models.sd3.bundle.SD3Bundle.from_config
  config:
    _target_: unirl.models.sd3.config.SD3PipelineConfig
    pretrained_model_ckpt_path: ${oc.env:PRETRAINED_MODEL,stabilityai/stable-diffusion-3.5-medium}
    model_precision: bf16
    shift: 3.0

pipeline:
  _target_: unirl.models.sd3.pipeline.SD3Pipeline
  shift: 3.0
  autocast_precision: bf16
  trajectory_precision: bf16
  logprob_precision: fp32
  strategy:
    _target_: unirl.sde.kernels.FlowSDEStrategy

backend:
  _target_: unirl.train.backend.fsdp.FSDPBackend
  block_class_names: ["JointTransformerBlock"]
  trainable_attr: transformer
  fsdp_cfg:
    _target_: unirl.train.configs.FSDPConfig
    param_dtype: bf16
    cpu_offload: false
    mixed_precision: true
    fsdp_mode: full
    reshard_after_forward: false  # SD3.5-medium is small (~5 GB bf16 full); keep params gathered, skip bwd re-gather
    activation_checkpointing: false  # v1 base flowgrpo_fast_sd3_trainside = bf16_full_noac
    use_torch_compile: false
  optimizer_cfg:
    _target_: unirl.train.backend.base.OptimizerConfig
    learning_rate: 3.0e-4
    adam_beta1: 0.9
    adam_beta2: 0.999
    adam_epsilon: 1.0e-8
    weight_decay: 1.0e-4             # v1 mixgrpo sets weight_decay 1e-4
  scheduler_cfg:
    _target_: unirl.train.backend.base.LrSchedulerConfig
    type: constant
    warmup_steps: 0
    total_steps: 10000
  lora_cfg:
    _target_: unirl.train.configs.LoraConfig
    rank: 32
    alpha: 64
    dropout: 0.0
    bias: none
    task_type: FEATURE_EXTRACTION
    target_modules:
      - attn.add_k_proj
      - attn.add_q_proj
      - attn.add_v_proj
      - attn.to_add_out
      - attn.to_k
      - attn.to_out.0
      - attn.to_q
      - attn.to_v

rollout:
  _target_: unirl.rollout.engine.trainside.engine.TrainsideRolloutEngine
  stage_attrs: [diffusion]
  forward_batch_size: 8            # v1 flowgrpo_fast_sd3_trainside

reward:
  _target_: unirl.reward.service.RewardService
  backend:
    _target_: unirl.reward.local.pickscore.PickScoreRewardScorer
    base_device: cuda
    config:
      _target_: unirl.reward.local.pickscore.PickScoreSpec
      batch_size: 8
      device: auto
      processor_id: laion/CLIP-ViT-H-14-laion2B-s32B-b79K
      model_id: yuvalkirstain/PickScore_v1

algorithm:
  _target_: unirl.algorithms.flowgrpo.FlowGRPO
  stage_attr: diffusion
  clip_range: 1.0e-4
  clip_schedule: constant
  old_logp_source: replay
  conditions_cls:
    _target_: hydra.utils.get_class
    path: unirl.models.sd3.conditions.SD3Conditions
  params: ${sampling}

stack:
  _target_: unirl.train.stack.TrainStack
  micro_batch_size: 8
  max_grad_norm: 1.0
  num_updates_per_batch: 2      # PPO mini-batches per rollout (π_old frozen once); v1 parity

data_source:
  _target_: unirl.data.data_source.MultimodalRLDataSource
  args:
    run:
      data_path: datasets/pickscore/train.txt
      eval_data_path: datasets/pickscore/test.txt
      seed: 42
    algorithm:
      prompts_per_rollout: ${batch_size}

sampling:
  _target_: unirl.types.sampling.DiffusionSamplingParams
  num_inference_steps: 10
  guidance_scale: 1.0
  height: 512
  width: 512
  eta: 0.7
  samples_per_prompt: 16
  seed: 42
  init_same_noise: true            # v1 mixgrpo sets init_same_noise true
  # Progressive sliding-window SDE-index schedule (MixGRPO). The window of
  # SDE-recorded steps advances with the rollout id; rolls back to the start
  # once it sweeps the schedule.
  scheduler:
    _target_: unirl.utils.scheduler_utils.WindowScheduler
    num_timesteps: ${..num_inference_steps}
    config:
      _target_: unirl.utils.scheduler_utils.WindowConfig
      strategy: progressive
      window_size: 4
      iters_per_window: 25
      init_timestep: 0
      overlap_size: 1
      roll_back: true
      max_iters_per_window: 10
      min_iters_per_window: 1

logging:
  report_to_wandb: ${oc.decode:${oc.env:REPORT_TO_WANDB,true}}
  project_name: ${oc.env:WANDB_PROJECT,unirl-mixgrpo}
  run_name: ${oc.env:WANDB_RUN_NAME,sd3_mixgrpo}
  entity: ${oc.env:WANDB_ENTITY,null}
  tags: ["sd3.5", "mixgrpo", "grpo", "trainside", "v2"]
  log_media: true
  media_max_items: 8
  media_log_interval: 1
