# @package _global_
# FlowDPPO SD3.5 trainside (FSDP) colocate, v2 trainer, 1x8.
#
# FlowDPPO replaces PPO ratio clipping with KL-divergence-based masking:
#   - algorithm._target_ = FlowDPPO (vs FlowGRPO).
#   - kl_mask_threshold: KL threshold below which updates pass unmasked.
#   - add_kl_coefficient: normalize KL by sigma_t (flow-matching noise scale).
#   - No clip_range (replaced by KL masking). FlowDPPO's prepare_segment replays at
#     pre-update weights to capture old means (the KL reference).
# SDE indices: sparse over the first half (timestep_fraction [0.0, 0.5], 3 steps).
#
# Faithful to v1 (vs sd3_trainside): micro_batch_size 8, forward_batch_size 8.
# Diverges: activation_checkpointing OFF (v1 used bf16_full_ac; dropped for speed).
# Not carried over: v1 training.ema (full-model decay-0.99 mirror) — it was an
#   eval/export EMA; the minimal v2 trainer does no eval-EMA swap, so a mirror
#   would only double model memory unused. v1 num_updates_per_batch=2 IS restored
#   (v2 TrainStack multi-update; FlowDPPO freezes its KL anchor in prepare_segment).

num_devices: 8                # 1 node x 8 GPUs (v1 actor_count 8)
batch_size: 48                # prompts_per_rollout
num_rollouts: 10000

# Advantage scale: group-mean advantages divided by ONE batch-wide std (like the
# v1 recipe's use_global_std=true), not each prompt's own std. NB this reduces over
# the FULL batch; v1 reduced per rollout actor (1/actor_count of the batch). Same
# expectation, intentionally topology-independent. See RolloutTrack.compute_advantages.
adv_use_global_std: true

bundle:
  _target_: unirl.models.sd3.bundle.SD3Bundle.from_config
  config:
    _target_: unirl.models.sd3.config.SD3PipelineConfig
    pretrained_model_ckpt_path: ${oc.env:PRETRAINED_MODEL,stabilityai/stable-diffusion-3.5-medium}
    model_precision: bf16
    shift: 3.0

pipeline:
  _target_: unirl.models.sd3.pipeline.SD3Pipeline
  shift: 3.0
  autocast_precision: bf16
  trajectory_precision: bf16
  logprob_precision: fp32
  strategy:
    _target_: unirl.sde.kernels.FlowSDEStrategy

backend:
  _target_: unirl.train.backend.fsdp.FSDPBackend
  block_class_names: ["JointTransformerBlock"]
  trainable_attr: transformer
  fsdp_cfg:
    _target_: unirl.train.configs.FSDPConfig
    param_dtype: bf16
    cpu_offload: false
    mixed_precision: true
    fsdp_mode: full
    reshard_after_forward: false  # SD3.5-medium is small (~5 GB bf16 full); keep params gathered, skip bwd re-gather
    activation_checkpointing: false  # deliberately off (speed); v1 used bf16_full_ac
    use_torch_compile: false
  optimizer_cfg:
    _target_: unirl.train.backend.base.OptimizerConfig
    learning_rate: 3.0e-4
    adam_beta1: 0.9
    adam_beta2: 0.999
    adam_epsilon: 1.0e-8
    weight_decay: 0.0
  scheduler_cfg:
    _target_: unirl.train.backend.base.LrSchedulerConfig
    type: constant
    warmup_steps: 0
    total_steps: 10000
  lora_cfg:
    _target_: unirl.train.configs.LoraConfig
    rank: 32
    alpha: 64
    dropout: 0.0
    bias: none
    task_type: FEATURE_EXTRACTION
    target_modules:
      - attn.add_k_proj
      - attn.add_q_proj
      - attn.add_v_proj
      - attn.to_add_out
      - attn.to_k
      - attn.to_out.0
      - attn.to_q
      - attn.to_v

rollout:
  _target_: unirl.rollout.engine.trainside.engine.TrainsideRolloutEngine
  stage_attrs: [diffusion]
  forward_batch_size: 8

reward:
  _target_: unirl.reward.service.RewardService
  backend:
    _target_: unirl.reward.local.pickscore.PickScoreRewardScorer
    base_device: cuda
    config:
      _target_: unirl.reward.local.pickscore.PickScoreSpec
      batch_size: 8
      device: auto
      processor_id: laion/CLIP-ViT-H-14-laion2B-s32B-b79K
      model_id: yuvalkirstain/PickScore_v1

algorithm:
  _target_: unirl.algorithms.flowdppo.FlowDPPO
  stage_attr: diffusion
  conditions_cls:
    _target_: hydra.utils.get_class
    path: unirl.models.sd3.conditions.SD3Conditions
  params: ${sampling}
  # FlowDPPO hyperparameters (v1 algorithm.algorithms.diffusion block).
  kl_mask_threshold: 1.0e-5
  add_kl_coefficient: true
  # beta: reference-policy KL coeff (Flow-DPPO eq.17), LoRA-only; 0 disables. Detail in FlowDPPO/config.yaml.
  beta: 0.0

stack:
  _target_: unirl.train.stack.TrainStack
  micro_batch_size: 8
  max_grad_norm: 1.0
  num_updates_per_batch: 2      # PPO mini-batches per rollout (KL anchor frozen once); v1 parity

data_source:
  _target_: unirl.data.data_source.MultimodalRLDataSource
  args:
    run:
      data_path: datasets/pickscore/train.txt
      eval_data_path: datasets/pickscore/test.txt
      seed: 42
    algorithm:
      prompts_per_rollout: ${batch_size}

sampling:
  _target_: unirl.types.sampling.DiffusionSamplingParams
  num_inference_steps: 10
  guidance_scale: 1.0
  height: 512
  width: 512
  eta: 0.7
  samples_per_prompt: 16
  seed: 42
  init_same_noise: false
  scheduler:
    _target_: unirl.utils.scheduler_utils.AllSDEScheduler
    num_timesteps: ${..num_inference_steps}
    timestep_fraction: [0.0, 0.5]   # SDE steps drawn from the first half (v1)
    num_sde_steps: 3

logging:
  report_to_wandb: ${oc.decode:${oc.env:REPORT_TO_WANDB,true}}
  project_name: ${oc.env:WANDB_PROJECT,unirl-flowdppo}
  run_name: ${oc.env:WANDB_RUN_NAME,sd3_flowdppo}
  entity: ${oc.env:WANDB_ENTITY,null}
  tags: ["sd3.5", "dppo", "flowdppo", "kl-adv", "trainside", "v2"]
  log_media: false
  media_max_items: 8
  media_log_interval: 1
