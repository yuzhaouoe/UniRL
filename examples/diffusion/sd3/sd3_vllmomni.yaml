# @package _global_
# FlowGRPO-Fast SD3 colocate reproduce — v2 trainer variant.
# 1x8 H20 colocate baseline. Diverges only on:
#   - activation_checkpointing: false (user request; reference uses bf16_full_ac)
#   - rollout engine: TrainsideRolloutEngine (v2 in-process colocate; reference uses vllm-omni)
#   - num_updates_per_batch: 2 — restored (v2 TrainStack multi-update; matches v1 base)

num_devices: 8
batch_size: 48 # prompts_per_rollout
adv_use_global_std: true     # advantage: divide by ONE batch-wide std (v1 parity), not per-group
# samples_per_prompt lives inside `sampling` (DiffusionSamplingParams).

# LoRA weight-sync cadence (loop concern, read by DiffusionTrainer.train — NOT
# a LocalLoraWeightSync field). Every N rollouts the loop pushes the freshly-trained
# adapter into the rollout engine. 1 = on-policy; >1 lags rollout weights
# (off-policy drift). Ignored when the `sync` block below is absent (trainside).
weight_sync_interval: 1

logging:
  report_to_wandb: false        # flip to true to enable wandb (rank-0/driver only)
  project_name: unirl
  run_name: null
  entity: null
  tags: null

bundle:
  _target_: unirl.models.sd3.bundle.SD3Bundle.from_config
  config:
    _target_: unirl.models.sd3.config.SD3PipelineConfig
    pretrained_model_ckpt_path: ${oc.env:PRETRAINED_MODEL,stabilityai/stable-diffusion-3.5-medium}
    model_precision: bf16
    shift: 3.0

pipeline:
  _target_: unirl.models.sd3.pipeline.SD3Pipeline
  shift: 3.0
  autocast_precision: bf16
  trajectory_precision: bf16
  logprob_precision: fp32
  strategy:
    _target_: unirl.sde.kernels.FlowSDEStrategy

backend:
  _target_: unirl.train.backend.fsdp.FSDPBackend
  block_class_names: ["JointTransformerBlock"]
  trainable_attr: transformer
  fsdp_cfg:
    _target_: unirl.train.configs.FSDPConfig
    param_dtype: bf16
    cpu_offload: false
    mixed_precision: true
    fsdp_mode: full
    reshard_after_forward: false  # SD3.5-medium is small (~5 GB bf16 full); keep params gathered, skip bwd re-gather
    activation_checkpointing: false # diverges from reference (bf16_full_ac) per user request
    use_torch_compile: false
  optimizer_cfg:
    _target_: unirl.train.backend.base.OptimizerConfig
    learning_rate: 3.0e-4
    adam_beta1: 0.9
    adam_beta2: 0.999
    adam_epsilon: 1.0e-8
    weight_decay: 0.0
  scheduler_cfg:
    _target_: unirl.train.backend.base.LrSchedulerConfig
    type: constant
    warmup_steps: 0
    total_steps: 10000
  lora_cfg:
    _target_: unirl.train.configs.LoraConfig
    rank: 32
    alpha: 64
    dropout: 0.0
    bias: none
    task_type: FEATURE_EXTRACTION
    target_modules:
      - attn.add_k_proj
      - attn.add_q_proj
      - attn.add_v_proj
      - attn.to_add_out
      - attn.to_k
      - attn.to_out.0
      - attn.to_q
      - attn.to_v

rollout:
  _target_: unirl.rollout.engine.vllm_omni.engine.VLLMOmniRolloutEngine
  # model_config carries the σ-schedule `shift`; point it at the bundle's config
  # so train + rollout share one source (worker materializes the nested _target_).
  model_config: ${bundle.config}
  config:
    _target_: unirl.rollout.engine.vllm_omni.config.VLLMOmniEngineConfig
    # Required; same checkpoint the bundle loads.
    model_path: ${oc.env:PRETRAINED_MODEL,stabilityai/stable-diffusion-3.5-medium}
    # SD3 single-stage diffusion modality (matches the reference
    # flowgrpo_fast_sd3_colocate_reproduce.yaml rollout.engine block).
    modality: sd3_t2i
    # Required for colocate: trainer calls sleep()/wake_up() around the
    # train phase, which is a no-op unless CuMemAllocator is enabled at
    # vLLM-Omni init time (this knob flips ``enable_sleep_mode: True`` into
    # each stage's engine_args).
    enable_sleep_mode: true

reward:
  _target_: unirl.reward.service.RewardService
  backend:
    _target_: unirl.reward.local.pickscore.PickScoreRewardScorer
    base_device: cuda
    config:
      _target_: unirl.reward.local.pickscore.PickScoreSpec
      batch_size: 8
      device: auto
      processor_id: laion/CLIP-ViT-H-14-laion2B-s32B-b79K
      model_id: yuvalkirstain/PickScore_v1

algorithm:
  _target_: unirl.algorithms.flowgrpo.FlowGRPO
  stage_attr: diffusion
  clip_range: 1.0e-4
  clip_schedule: constant
  conditions_cls:
    _target_: hydra.utils.get_class
    path: unirl.models.sd3.conditions.SD3Conditions
  # Algorithm.compute_loss_and_backward needs guidance_scale / eta inside
  # stage.replay; bind to the sampling block (matches sd3_trainside.yaml).
  params: ${sampling}

stack:
  _target_: unirl.train.stack.TrainStack
  micro_batch_size: 1
  max_grad_norm: 1.0
  num_updates_per_batch: 2      # PPO mini-batches per rollout (π_old frozen once); v1 parity

data_source:
  # Real prompts loaded from file: MultimodalRLDataSource reads TXT/JSON/JSONL
  # via data_path and exposes get_samples(bs). (DefaultDataSource returns only
  # 8 hardcoded prompts — smoke-test use; training on it over-optimizes/collapses.)
  _target_: unirl.data.data_source.MultimodalRLDataSource
  args:
    run:
      data_path: datasets/pickscore/train.txt        # relative to repo cwd (Hydra 1.3 no-chdir)
      eval_data_path: datasets/pickscore/test.txt
      seed: 42
    algorithm:
      prompts_per_rollout: ${batch_size}

sampling:
  _target_: unirl.types.sampling.DiffusionSamplingParams
  num_inference_steps: 10
  guidance_scale: 1.0
  height: 512
  width: 512
  eta: 0.7
  samples_per_prompt: 16
  seed: 42
  init_same_noise: false
  # SDE step schedule: which denoising steps record SDE log-probs.
  # num_sde_steps: null = all steps; int = sparse subset; 0 = none (DiffusionNFT).
  # A static `sde_indices: [...]` overrides this. (WindowScheduler also available.)
  scheduler:
    _target_: unirl.utils.scheduler_utils.AllSDEScheduler
    num_timesteps: ${..num_inference_steps}
    num_sde_steps: 3
    # SDE-step window: [0,0.5] confines SDE noise to the early high-σ steps
    # (the validated reproduce setting); [0,1] spreads it across all steps.
    timestep_fraction: [0, 0.5]

# LoRA weight sync → vLLM-Omni rollout. Instantiated as a LocalLoraWeightSync
# (sibling of backend + rollout) from this block's `_target_`, exactly like the
# blocks above. The train loop drives cadence via `weight_sync_interval` (top of
# file): every N rollouts it calls sync() to push the freshly-trained
# LoRA (set_lora_from_tensors) into the engine just before that rollout's
# generate — fused into the generate wake/sleep, so a synced step costs one
# wake+sleep, not two. Absent on examples/diffusion/sd3/sd3_trainside.yaml (trainside shares
# the trained module — no sync).
sync:
  _target_: unirl.distributed.weight_sync.lora.LocalLoraWeightSync
  verify: true # checksum read-back asserts the synced LoRA landed; set false once trusted
  # Mirrors SD3PipelineConfig.weight_sync_param_name_prefix; must match the
  # engine-side LoRA key naming (a wrong prefix yields wrong/zero loaded layers,
  # which `verify` catches).
  param_prefix: "transformer."
  adapter_name: default
