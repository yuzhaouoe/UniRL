# @package _global_
# SD3.5 + DiffusionNFT trainside, v2 trainer — remote RewardService variant.
#
# Identical to sd3_nft.yaml except the reward backend: instead of the local
# PickScore scorer, a single RemoteRewardBackend calls an HTTP service that
# computes hpsv2 / pickscore / unified_reward / imagereward / hpsv3 in one
# round trip (frees local GPUs for train + rollout). Set the URL via env:
#   REWARD_SERVICE_URL=http://10.0.0.5:8080 ... +experiment=sd3_nft_reward_service

num_devices: 8
batch_size: 48                # prompts_per_rollout
adv_use_global_std: true     # advantage: divide by ONE batch-wide std (v1 parity), not per-group
num_rollouts: 10000

bundle:
  _target_: unirl.models.sd3.bundle.SD3Bundle.from_config
  config:
    _target_: unirl.models.sd3.config.SD3PipelineConfig
    pretrained_model_ckpt_path: ${oc.env:PRETRAINED_MODEL,stabilityai/stable-diffusion-3.5-medium}
    model_precision: bf16
    shift: 3.0

pipeline:
  _target_: unirl.models.sd3.pipeline.SD3Pipeline
  shift: 3.0
  autocast_precision: bf16
  trajectory_precision: bf16
  logprob_precision: fp32
  strategy:
    _target_: unirl.sde.kernels.FlowSDEStrategy

backend:
  _target_: unirl.train.backend.fsdp.FSDPBackend
  block_class_names: ["JointTransformerBlock"]
  trainable_attr: transformer
  fsdp_cfg:
    _target_: unirl.train.configs.FSDPConfig
    param_dtype: bf16
    cpu_offload: false
    mixed_precision: true
    fsdp_mode: full
    reshard_after_forward: false  # SD3.5-medium is small (~5 GB bf16 full); keep params gathered, skip bwd re-gather
    activation_checkpointing: false  # deliberately off (speed); v1 used bf16_full_ac
    use_torch_compile: false
  optimizer_cfg:
    _target_: unirl.train.backend.base.OptimizerConfig
    learning_rate: 3.0e-4
    adam_beta1: 0.9
    adam_beta2: 0.999
    adam_epsilon: 1.0e-8
    weight_decay: 1.0e-4
  scheduler_cfg:
    _target_: unirl.train.backend.base.LrSchedulerConfig
    type: constant
    warmup_steps: 0
    total_steps: 10000
  ema_lora_cfg:
    _target_: unirl.train.configs.EmaLoraConfig
    rank: 32
    alpha: 64
    dropout: 0.0
    bias: none
    task_type: FEATURE_EXTRACTION
    shadow_adapter: old
    ema_decay: 0.001
    ema_decay_type: warmup
    ema_flat_steps: 0
    ema_uprate: 0.001
    ema_uphold: 0.5
    timing: rollout_end
    target_modules:
      - attn.add_k_proj
      - attn.add_q_proj
      - attn.add_v_proj
      - attn.to_add_out
      - attn.to_k
      - attn.to_out.0
      - attn.to_q
      - attn.to_v

rollout:
  _target_: unirl.rollout.engine.trainside.engine.TrainsideRolloutEngine
  stage_attrs: [diffusion]
  forward_batch_size: 32

# Remote RewardService backend: one HTTP round trip multiplexes all five
# reward models. Mirrors the v1 reward_service component (weights 0.2 each).
reward:
  _target_: unirl.reward.service.RewardService
  backend:
    _target_: unirl.reward.remote.RemoteRewardBackend
    base_device: cpu
    config:
      _target_: unirl.reward.remote.RemoteRewardSpec
      base_url: ${oc.env:REWARD_SERVICE_URL,http://localhost:8080}
      required_rewards: [hpsv2, pickscore, unified_reward, imagereward, hpsv3]
      reward_weights:
        hpsv2: 0.2
        pickscore: 0.2
        unified_reward: 0.2
        imagereward: 0.2
        hpsv3: 0.2
      batch_size: 8
      timeout: 120.0
      aggregation_method: weighted_sum

algorithm:
  _target_: unirl.algorithms.diffusionnft.DiffusionNFT
  stage_attr: diffusion
  conditions_cls:
    _target_: hydra.utils.get_class
    path: unirl.models.sd3.conditions.SD3Conditions
  params: ${sampling}
  beta: 1.0
  adv_clip_max: 5.0
  adv_mode: raw
  use_adaptive_weight: true
  train_timestep_mode: all
  shuffle_train_timesteps: true
  apply_time_shift_in_loss: false
  training_timestep_fraction: 0.99
  kl_coef: 0.0

stack:
  _target_: unirl.train.stack.TrainStack
  micro_batch_size: 8
  max_grad_norm: 1.0

data_source:
  _target_: unirl.data.data_source.MultimodalRLDataSource
  args:
    run:
      data_path: datasets/pickscore/train.txt
      eval_data_path: datasets/pickscore/test.txt
      seed: 42
    algorithm:
      prompts_per_rollout: ${batch_size}

sampling:
  _target_: unirl.types.sampling.DiffusionSamplingParams
  num_inference_steps: 10
  guidance_scale: 1.0
  height: 512
  width: 512
  eta: 0.0
  samples_per_prompt: 16
  seed: 42
  init_same_noise: false
  scheduler:
    _target_: unirl.utils.scheduler_utils.AllSDEScheduler
    num_timesteps: ${..num_inference_steps}
    num_sde_steps: 0

logging:
  report_to_wandb: ${oc.decode:${oc.env:REPORT_TO_WANDB,true}}
  project_name: ${oc.env:WANDB_PROJECT,unirl-diffusionNFT}
  run_name: ${oc.env:WANDB_RUN_NAME,sd3_nft_reward_service}
  entity: ${oc.env:WANDB_ENTITY,null}
  tags: ["sd3.5", "nft", "reward_service", "trainside", "v2"]
  log_media: true
  media_max_items: 8
  media_log_interval: 1
