# @package _global_
# FlowDPPO SD3.5 — vLLM-Omni colocate variant, v2 trainer, 1x8.
#
# Same FlowDPPO algorithm as sd3_flowdppo.yaml (KL-divergence masking), but the
# rollout runs on a vLLM-Omni engine (separate sampler, LoRA weight-synced into
# the engine each rollout) instead of the in-process trainside engine.
#
# Diverges from the v1 recipe on the weight-sync mechanism: v1 used
# tensor_payload (full-tensor sync); this reuses the v2 vLLM-Omni LoRA bridge
# (LocalLoraWeightSync), matching sd3_vllmomni.yaml.
# Faithful to v1 otherwise: micro_batch_size 1. v1 num_updates_per_batch=2 restored
# (v2 TrainStack multi-update). Diverges also on activation_checkpointing: OFF
# (v1 used bf16_full_ac; dropped for speed).

num_devices: 8                # 1 node x 8 GPUs (v1 actor_count 8)
batch_size: 48                # prompts_per_rollout
num_rollouts: 10000
weight_sync_interval: 1

# Group-mean advantages / single FULL-batch std (like v1 use_global_std=true, but
# reduced over the full batch, not v1's per-actor shard); see sd3_flowdppo.yaml.
adv_use_global_std: true

bundle:
  _target_: unirl.models.sd3.bundle.SD3Bundle.from_config
  config:
    _target_: unirl.models.sd3.config.SD3PipelineConfig
    pretrained_model_ckpt_path: ${oc.env:PRETRAINED_MODEL,stabilityai/stable-diffusion-3.5-medium}
    model_precision: bf16
    autocast_precision: bf16
    trajectory_precision: bf16
    logprob_precision: fp32
    shift: 3.0

pipeline:
  _target_: unirl.models.sd3.pipeline.SD3Pipeline
  shift: 3.0
  autocast_precision: bf16
  trajectory_precision: bf16
  logprob_precision: fp32
  strategy:
    _target_: unirl.sde.kernels.FlowSDEStrategy

backend:
  _target_: unirl.train.backend.fsdp.FSDPBackend
  block_class_names: ["JointTransformerBlock"]
  trainable_attr: transformer
  fsdp_cfg:
    _target_: unirl.train.configs.FSDPConfig
    param_dtype: bf16
    cpu_offload: false
    mixed_precision: true
    fsdp_mode: full
    reshard_after_forward: false  # SD3.5-medium is small (~5 GB bf16 full); keep params gathered, skip bwd re-gather
    activation_checkpointing: false  # deliberately off (speed); v1 used bf16_full_ac
    use_torch_compile: false
  optimizer_cfg:
    _target_: unirl.train.backend.base.OptimizerConfig
    learning_rate: 3.0e-4
    adam_beta1: 0.9
    adam_beta2: 0.999
    adam_epsilon: 1.0e-8
    weight_decay: 0.0
  scheduler_cfg:
    _target_: unirl.train.backend.base.LrSchedulerConfig
    type: constant
    warmup_steps: 0
    total_steps: 10000
  lora_cfg:
    _target_: unirl.train.configs.LoraConfig
    rank: 32
    alpha: 64
    dropout: 0.0
    bias: none
    task_type: FEATURE_EXTRACTION
    target_modules:
      - attn.add_k_proj
      - attn.add_q_proj
      - attn.add_v_proj
      - attn.to_add_out
      - attn.to_k
      - attn.to_out.0
      - attn.to_q
      - attn.to_v

rollout:
  _target_: unirl.rollout.engine.vllm_omni.engine.VLLMOmniRolloutEngine
  model_config: ${bundle.config}
  config:
    _target_: unirl.rollout.engine.vllm_omni.config.VLLMOmniEngineConfig
    model_path: ${oc.env:PRETRAINED_MODEL,stabilityai/stable-diffusion-3.5-medium}
    modality: sd3_t2i
    enable_sleep_mode: true

reward:
  _target_: unirl.reward.service.RewardService
  backend:
    _target_: unirl.reward.local.pickscore.PickScoreRewardScorer
    base_device: cuda
    config:
      _target_: unirl.reward.local.pickscore.PickScoreSpec
      batch_size: 8
      device: auto
      processor_id: laion/CLIP-ViT-H-14-laion2B-s32B-b79K
      model_id: yuvalkirstain/PickScore_v1

algorithm:
  _target_: unirl.algorithms.flowdppo.FlowDPPO
  stage_attr: diffusion
  conditions_cls:
    _target_: hydra.utils.get_class
    path: unirl.models.sd3.conditions.SD3Conditions
  params: ${sampling}
  kl_mask_threshold: 1.0e-5
  add_kl_coefficient: true

stack:
  _target_: unirl.train.stack.TrainStack
  micro_batch_size: 1
  max_grad_norm: 1.0
  num_updates_per_batch: 2      # PPO mini-batches per rollout (KL anchor frozen once); v1 parity

data_source:
  _target_: unirl.data.data_source.MultimodalRLDataSource
  args:
    run:
      data_path: datasets/pickscore/train.txt
      eval_data_path: datasets/pickscore/test.txt
      seed: 42
    algorithm:
      prompts_per_rollout: ${batch_size}

sampling:
  _target_: unirl.types.sampling.DiffusionSamplingParams
  num_inference_steps: 10
  guidance_scale: 1.0
  height: 512
  width: 512
  eta: 0.7
  samples_per_prompt: 16
  seed: 42
  init_same_noise: false
  autocast_precision: bf16
  trajectory_precision: bf16
  logprob_precision: fp32
  scheduler:
    _target_: unirl.utils.scheduler_utils.AllSDEScheduler
    num_timesteps: ${..num_inference_steps}
    timestep_fraction: [0.0, 0.5]
    num_sde_steps: 3

# LoRA weight sync → vLLM-Omni rollout (same bridge as sd3_vllmomni.yaml).
sync:
  _target_: unirl.distributed.weight_sync.lora.LocalLoraWeightSync
  verify: true
  param_prefix: "transformer."
  adapter_name: default

logging:
  report_to_wandb: ${oc.decode:${oc.env:REPORT_TO_WANDB,true}}
  project_name: ${oc.env:WANDB_PROJECT,unirl-flowdppo}
  run_name: ${oc.env:WANDB_RUN_NAME,sd3_flowdppo_vllmomni}
  entity: ${oc.env:WANDB_ENTITY,null}
  tags: ["sd3.5", "dppo", "flowdppo", "kl-adv", "vllm-omni", "v2"]
  log_media: false
  media_max_items: 8
  media_log_interval: 1
