# @package _global_
# ReFL (DRaFT-K direct differentiable-reward backprop) — SD3.5 trainside, 1x8.
#
# Two roles (always): ReFLPolicy (FSDP SD3 + grad DRaFT-K sampling + optimizer)
# on `policy_device_fraction` of the pool, and a frozen differentiable PickScore
# reward on the rest. Gradient crosses the role boundary via the distributed
# enable_grad() context (Phase-0 validated). Loss = -reward.mean(); NO
# advantages / replay / ratio / rollout-engine / weight-sync.
#
# Divisibility: batch_size must be divisible by BOTH role dp sizes. With
# policy_device_fraction=0.75 on 8 GPUs → policy dp=6, reward dp=2 → batch % 6 == 0.

num_devices: 8
batch_size: 12                 # divisible by policy dp=6 and reward dp=2
num_rollouts: 200
policy_device_fraction: 0.75   # policy on 6 GPUs, reward on 2
max_grad_norm: 1.0
save_interval: 0
save_mode: adapter

policy:
  _target_: unirl.train.refl.policy.ReFLPolicy
  pipeline_target: unirl.models.sd3.pipeline.SD3Pipeline   # family selector — swap this + model_config for another family, no code
  draft_num_steps: 1           # grad through the final step only (DRaFT-1)
  reward_loss_scale: 1.0
  guidance_scale: 1.0
  num_inference_steps: 4
  height: 512
  width: 512
  seed: 42
  activation_checkpoint_vae: true
  block_class_names: ["JointTransformerBlock"]
  strategy:
    _target_: unirl.sde.kernels.FlowSDEStrategy
  model_config:
    _target_: unirl.models.sd3.config.SD3PipelineConfig
    pretrained_model_ckpt_path: ${oc.env:PRETRAINED_MODEL,stabilityai/stable-diffusion-3.5-medium}
    model_precision: bf16
    autocast_precision: bf16
    trajectory_precision: bf16
    logprob_precision: fp32
    shift: 3.0
  fsdp_cfg:
    _target_: unirl.train.configs.FSDPConfig
    param_dtype: bf16
    cpu_offload: false
    mixed_precision: true
    fsdp_mode: full
    reshard_after_forward: true       # deeper ReFL grad graph — re-gather to save memory
    activation_checkpointing: true
    master_dtype: fp32                # fp32 LoRA master (keeps small DRaFT grads; the dpgo footgun)
    root_wrap: true
  optimizer_cfg:
    _target_: unirl.train.backend.base.OptimizerConfig
    learning_rate: 1.0e-4
    adam_beta1: 0.9
    adam_beta2: 0.999
    adam_epsilon: 1.0e-8
    weight_decay: 0.0
  scheduler_cfg:
    _target_: unirl.train.backend.base.LrSchedulerConfig
    type: constant
    warmup_steps: 0
    total_steps: ${num_rollouts}
  lora_cfg:
    _target_: unirl.train.configs.LoraConfig
    rank: 32
    alpha: 64
    dropout: 0.0
    bias: none
    task_type: FEATURE_EXTRACTION
    target_modules:
      - attn.add_k_proj
      - attn.add_q_proj
      - attn.add_v_proj
      - attn.to_add_out
      - attn.to_k
      - attn.to_out.0
      - attn.to_q
      - attn.to_v

reward:
  _target_: unirl.reward.service.RewardService
  backend:
    _target_: unirl.reward.local.pickscore.PickScoreRewardScorer
    base_device: cuda
    config:
      _target_: unirl.reward.local.pickscore.PickScoreSpec
      batch_size: 8
      device: auto
      processor_id: laion/CLIP-ViT-H-14-laion2B-s32B-b79K
      model_id: yuvalkirstain/PickScore_v1

data_source:
  _target_: unirl.data.data_source.MultimodalRLDataSource
  args:
    run:
      data_path: datasets/pickscore/train.txt
      eval_data_path: datasets/pickscore/test.txt
      seed: 42
    algorithm:
      prompts_per_rollout: ${batch_size}

logging:
  report_to_wandb: ${oc.decode:${oc.env:REPORT_TO_WANDB,true}}
  project_name: ${oc.env:WANDB_PROJECT,unirl-refl}
  run_name: ${oc.env:WANDB_RUN_NAME,refl_sd3}
  entity: ${oc.env:WANDB_ENTITY,null}
  tags: ["sd3.5", "refl", "draft-k", "reward-backprop", "trainside"]
  log_media: false
