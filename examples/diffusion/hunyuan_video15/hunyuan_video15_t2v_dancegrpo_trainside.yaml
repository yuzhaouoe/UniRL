# @package _global_
# HunyuanVideo-1.5 T2V GRPO — v2 trainer, in-process (trainside) rollout.
# DanceGRPO-aligned hyperparameters: steps=16, cfg=0, eta=0.25, shift=5.0,
# lr=1e-5, weight_decay=1e-4, LoRA r64.
#
# Stack:
#   - rollout engine: TrainsideRolloutEngine (colocated, no separate slab)
#   - backend: FSDPBackend wrapping HunyuanVideo15TransformerBlock
#     (upstream diffusers class name; matches _no_split_modules in
#     unirl.models.hunyuan_video15.diffusion)
#   - LoRA r64 on attn + ff projections
#   - VideoPickScore reward (PickScore on first frame)
# Layout: 1 node × 8 GPUs, all colocated; no weight sync section.
#
# Launch (1 node x 8 GPUs):
#   bash examples/run_experiment_single_node.sh diffusion/hunyuan_video15/hunyuan_video15_t2v_dancegrpo_trainside

num_devices: 8
batch_size: 48                # prompts_per_rollout (v1 dancegrpo: 48)
adv_use_global_std: true     # advantage: divide by ONE batch-wide std (v1 parity), not per-group

logging:
  report_to_wandb: true
  project_name: ${oc.env:WANDB_PROJECT,unirl-grpo-t2v}
  run_name: hunyuan_video15_t2v_dancegrpo_trainside
  entity: ${oc.env:WANDB_ENTITY,null}
  tags: [hunyuan_video15, t2v, grpo, dancegrpo, trainside, lora-r64, v2]

bundle:
  _target_: unirl.models.hunyuan_video15.bundle.HunyuanVideo15Bundle.from_config
  config:
    _target_: unirl.models.hunyuan_video15.config.HunyuanVideo15PipelineConfig
    pretrained_model_ckpt_path: ${oc.env:PRETRAINED_MODEL,hunyuanvideo-community/HunyuanVideo-1.5-Diffusers-480p_t2v}
    model_precision: bf16
    shift: 5.0

pipeline:
  _target_: unirl.models.hunyuan_video15.pipeline.HunyuanVideo15Pipeline
  shift: 5.0
  autocast_precision: bf16
  trajectory_precision: bf16
  logprob_precision: fp32
  strategy:
    _target_: unirl.sde.kernels.FlowSDEStrategy

backend:
  _target_: unirl.train.backend.fsdp.FSDPBackend
  # Upstream diffusers class name; do NOT rename (HF auto-discovery probes
  # this string against transformer.config._no_split_modules).
  block_class_names: ["HunyuanVideo15TransformerBlock"]
  trainable_attr: transformer
  fsdp_cfg:
    _target_: unirl.train.configs.FSDPConfig
    param_dtype: bf16
    cpu_offload: false
    mixed_precision: true
    fsdp_mode: full
    reshard_after_forward: true
    activation_checkpointing: true   # HV1.5 needs AC under r64 LoRA on H20
    use_torch_compile: false
  # DanceGRPO HV1.5 optimizer profile.
  optimizer_cfg:
    _target_: unirl.train.backend.base.OptimizerConfig
    learning_rate: 1.0e-5
    adam_beta1: 0.9
    adam_beta2: 0.999
    adam_epsilon: 1.0e-8
    weight_decay: 1.0e-4
  scheduler_cfg:
    _target_: unirl.train.backend.base.LrSchedulerConfig
    type: constant
    warmup_steps: 0
    total_steps: 1000
  lora_cfg:
    _target_: unirl.train.configs.LoraConfig
    rank: 64
    alpha: 64
    dropout: 0.0
    bias: none
    task_type: FEATURE_EXTRACTION
    target_modules:
      - attn.to_q
      - attn.to_k
      - attn.to_v
      - attn.to_out.0
      - attn.add_q_proj
      - attn.add_k_proj
      - attn.add_v_proj
      - attn.to_add_out
      - ff.net.0.proj
      - ff.net.2
      - ff_context.net.0.proj
      - ff_context.net.2

rollout:
  _target_: unirl.rollout.engine.trainside.engine.TrainsideRolloutEngine
  stage_attrs: [diffusion]
  # HV1.5 VAE on 480x480 t=5 latents is heavy; keep forward groups small.
  forward_batch_size: 1

reward:
  _target_: unirl.reward.service.RewardService
  backend:
    _target_: unirl.reward.local.video_pickscore.VideoPickScoreScorer
    base_device: cuda
    config:
      _target_: unirl.reward.local.video_pickscore.VideoPickScoreSpec
      batch_size: 8
      device: auto
      processor_id: laion/CLIP-ViT-H-14-laion2B-s32B-b79K
      model_id: yuvalkirstain/PickScore_v1

algorithm:
  _target_: unirl.algorithms.flowgrpo.FlowGRPO
  stage_attr: diffusion
  clip_range: 1.0e-4
  clip_schedule: constant
  conditions_cls:
    _target_: hydra.utils.get_class
    path: unirl.models.hunyuan_video15.conditions.HunyuanVideo15Conditions
  params: ${sampling}

stack:
  _target_: unirl.train.stack.TrainStack
  micro_batch_size: 1
  max_grad_norm: 1.0
  # v1 dancegrpo ran num_updates_per_batch=2 (2 PPO mini-batch optimizer
  # steps per rollout, π_old frozen once). Omitting it defaulted to 1 → a
  # single on-policy update where new_logp==old_logp → ratio_mean≡1 and a
  # diluted GRPO signal. sd3/wan dancegrpo v2 recipes all set 2.
  # per-worker batch = samples_per_prompt(24) * prompts_per_rollout(48) /
  # num_devices(8) = 144; 144 % 2 == 0 → mini-batch 72 (matches v1).
  num_updates_per_batch: 2

data_source:
  _target_: unirl.data.data_source.MultimodalRLDataSource
  # MultimodalRLDataSource.__init__(args) expects a v1-shape cfg with
  # args.run.{data_path,eval_data_path,seed} and
  # args.algorithm.prompts_per_rollout. Wrap these in nested dicts so
  # OmegaConf packs them as a DictConfig that supports attribute access.
  args:
    run:
      data_path: ${oc.env:DATA_PATH}
      eval_data_path: ${oc.env:EVAL_DATA_PATH,${oc.env:DATA_PATH}}
      seed: ${sampling.seed}
    algorithm:
      prompts_per_rollout: ${batch_size}

# DanceGRPO-aligned for HV1.5 T2V: 16 steps, eta=0.25, shift=5.0, cfg=0.
sampling:
  _target_: unirl.types.sampling.DiffusionSamplingParams
  num_inference_steps: 16
  guidance_scale: 0.0
  height: 480
  width: 480
  num_frames: 5
  eta: 0.25
  samples_per_prompt: 24        # v1 dancegrpo: 24 samples per prompt
  seed: 42
  init_same_noise: false
  scheduler:
    _target_: unirl.utils.scheduler_utils.AllSDEScheduler
    num_timesteps: ${..num_inference_steps}
    # feat-branch v1 dancegrpo recipe: SDE candidate pool = first 60% of the
    # schedule (steps 0..8 at T=16), then 8 of those are drawn as the
    # stochastic / trainable steps. Dropping timestep_fraction + num_sde_steps
    # defaulted to SDE-on-all-16-steps, which diluted the GRPO signal (root
    # cause of the flat-reward curves).
    timestep_fraction: [0.0, 0.6]
    num_sde_steps: 8
