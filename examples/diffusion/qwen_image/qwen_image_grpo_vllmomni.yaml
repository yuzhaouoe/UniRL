# @package _global_
# Qwen-Image + GRPO (FlowSDE) — vLLM-Omni colocate variant, v2 trainer, GRPO.
#
# Same algorithm/bundle/sampling as qwen_image_trainside.yaml (the trainside
# recipe, which doubles as the parity oracle), but the rollout runs on a
# vLLM-Omni v2 engine (separate sampler, LoRA weight-synced into the engine
# each rollout) instead of the in-process trainside engine. Mirrors how
# sd3_flowdppo_vllmomni_v2.yaml relates to its trainside twin.
#
# Engine deltas vs the trainside recipe — rollout block + sync block +
# weight_sync_interval only; everything else is byte-identical so a
# fixed-seed run compares cleanly against trainside.

num_devices: 8
batch_size: 48                # prompts_per_rollout
adv_use_global_std: true     # advantage: divide by ONE batch-wide std (v1 parity), not per-group
num_rollouts: 10000
weight_sync_interval: 1

logging:
  # Env-driven like sd3_flowdppo_vllmomni_v2 (the launcher exports these);
  # the trainside twins keep their hardcoded false.
  report_to_wandb: ${oc.decode:${oc.env:REPORT_TO_WANDB,false}}
  project_name: ${oc.env:WANDB_PROJECT,unirl}
  run_name: ${oc.env:WANDB_RUN_NAME,qwen_image_grpo_vllmomni_v2}
  entity: ${oc.env:WANDB_ENTITY,null}
  tags: ["qwen-image", "flow-grpo", "grpo", "vllm-omni", "v2"]

bundle:
  _target_: unirl.models.qwen_image.bundle.QwenImageBundle.from_config
  config:
    _target_: unirl.models.qwen_image.config.QwenImagePipelineConfig
    pretrained_model_ckpt_path: ${oc.env:QWEN_IMAGE_PATH,Qwen/Qwen-Image}
    model_precision: bf16
    max_sequence_length: 512
    # Trainer-side TE is dead weight on the separate-engine path (the
    # engine encodes; the trainer replays captured conditions) and its
    # ~15 GiB/rank starves the colocated engine boot (LIN-382 OOM).
    load_text_encoder: false
    load_vae: false
    # Static-shift fallback; the real checkpoint enables dynamic shifting via
    # scheduler/scheduler_config.json and this value is ignored at runtime.
    shift: 3.0

# Pipeline relies on the optional-stages constructor (mirrors SD3): the
# trainer auto-injects `bundle=self.bundle`; text_embed/diffusion/vae_decode
# are built from the bundle here using the precision policy below.
pipeline:
  _target_: unirl.models.qwen_image.pipeline.QwenImagePipeline
  shift: 3.0
  autocast_precision: bf16
  trajectory_precision: bf16
  logprob_precision: fp32
  max_sequence_length: 512
  # DanceGRPO: Dance SDE kernel (the one algorithmic difference from FlowGRPO).
  strategy:
    _target_: unirl.sde.kernels.FlowSDEStrategy

backend:
  _target_: unirl.train.backend.fsdp.FSDPBackend
  block_class_names: ["QwenImageTransformerBlock"]
  trainable_attr: transformer
  fsdp_cfg:
    _target_: unirl.train.configs.FSDPConfig
    param_dtype: bf16
    cpu_offload: false
    mixed_precision: true
    fsdp_mode: full
    reshard_after_forward: true
    # Qwen-Image transformer + Qwen2.5-VL text encoder together exceed 96GB
    # per H20 under full-graph replay without AC; v1 uses bf16_full_ac.
    activation_checkpointing: true
    use_torch_compile: false
  optimizer_cfg:
    _target_: unirl.train.backend.base.OptimizerConfig
    learning_rate: 3.0e-4
    adam_beta1: 0.9
    adam_beta2: 0.999
    adam_epsilon: 1.0e-8
    weight_decay: 0.0
  scheduler_cfg:
    _target_: unirl.train.backend.base.LrSchedulerConfig
    type: constant
    warmup_steps: 0
    total_steps: 10000
  lora_cfg:
    _target_: unirl.train.configs.LoraConfig
    rank: 64
    alpha: 128
    dropout: 0.0
    bias: none
    task_type: FEATURE_EXTRACTION
    # JointAttnProcessor naming — image stream (to_q/k/v, to_out.0) plus
    # text stream (add_*_proj, to_add_out). Verified against the diffusers
    # QwenImageTransformer2DModel attention layer.
    target_modules:
      - attn.add_k_proj
      - attn.add_q_proj
      - attn.add_v_proj
      - attn.to_add_out
      - attn.to_k
      - attn.to_out.0
      - attn.to_q
      - attn.to_v

rollout:
  _target_: unirl.rollout.engine.vllm_omni.engine.VLLMOmniRolloutEngine
  model_config: ${bundle.config}
  config:
    _target_: unirl.rollout.engine.vllm_omni.config.VLLMOmniEngineConfig
    model_path: ${oc.env:QWEN_IMAGE_PATH,Qwen/Qwen-Image}
    modality: qwen_image_t2i
    enable_sleep_mode: true

reward:
  _target_: unirl.reward.service.RewardService
  backend:
    _target_: unirl.reward.local.pickscore.PickScoreRewardScorer
    base_device: cuda
    config:
      _target_: unirl.reward.local.pickscore.PickScoreSpec
      batch_size: 8
      device: auto
      processor_id: laion/CLIP-ViT-H-14-laion2B-s32B-b79K
      model_id: yuvalkirstain/PickScore_v1

algorithm:
  _target_: unirl.algorithms.flowgrpo.FlowGRPO
  stage_attr: diffusion
  # Separate-engine recipes MUST anchor old_logp by trainer-side replay
  # (the class default 'native' trusts the ENGINE's rollout logp — correct
  # trainside, but cross-process it bakes the rollout<->replay numeric gap
  # into every first-epoch ratio: ~2-5e-5 offset vs clip_range 1e-4 in the
  # 0607 e2e. Every sd3 separate-engine recipe sets this; LIN-382.)
  old_logp_source: replay
  clip_range: 1.0e-4
  clip_schedule: constant
  conditions_cls:
    _target_: hydra.utils.get_class
    path: unirl.models.qwen_image.conditions.QwenImageConditions
  params: ${sampling}

stack:
  _target_: unirl.train.stack.TrainStack
  micro_batch_size: 1
  max_grad_norm: 1.0
  num_updates_per_batch: 2      # PPO mini-batches per rollout (π_old frozen once); v1 parity

data_source:
  _target_: unirl.data.data_source.MultimodalRLDataSource
  args:
    run:
      data_path: datasets/pickscore/train.txt
      eval_data_path: datasets/pickscore/test.txt
      seed: 42
    algorithm:
      prompts_per_rollout: ${batch_size}

sampling:
  _target_: unirl.types.sampling.DiffusionSamplingParams
  num_inference_steps: 12       # qwen_384 preset default
  guidance_scale: 1.0
  height: 384
  width: 384
  eta: 0.7
  samples_per_prompt: 16
  seed: 42
  init_same_noise: false
  # SDE step schedule inherited verbatim from qwen_image_trainside (DanceGRPO
  # swaps only the kernel, not the schedule).
  scheduler:
    _target_: unirl.utils.scheduler_utils.AllSDEScheduler
    num_timesteps: ${..num_inference_steps}
    num_sde_steps: 3
    # SDE-step window: [0,0.5] confines SDE noise to the early high-σ steps
    # (the validated reproduce setting); [0,1] spreads it across all steps.
    timestep_fraction: [0, 0.5]

# LoRA weight sync → vLLM-Omni rollout (same bridge as sd3_flowdppo_vllmomni_v2).
sync:
  _target_: unirl.distributed.weight_sync.lora.LocalLoraWeightSync
  verify: true
  param_prefix: "transformer."
  adapter_name: default
