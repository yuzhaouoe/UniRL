# @package _global_
# Qwen-Image + sglang_diffusion (v2 engine) colocate, REPLAY logprob, DanceGRPO, 1x8 H20.
#
# Composition: the rollout/sync blocks of sd3_sglang_replay_colocate.yaml
# (v2 engine, stock sglang 0.5.12.post1 + in-process _patches) x the model/training
# blocks of qwen_image_dancegrpo.yaml (trainside reference — the parity oracle:
# same prompts/seeds/x_T must produce matching trajectories/logprobs).
#
# Qwen-Image specifics vs the SD3 recipe:
#   - model_family: qwen_image — adapter unpacks the packed [B,T+1,S,64]
#     trajectory to true channels [B,T+1,16,H_lat,W_lat] (trainside segment form).
#   - engine_kwargs.model_id pins SGLang pipeline resolution explicitly
#     (otherwise the registry detector requires "qwen-image" in the lowercased
#     checkpoint path).
#   - σ schedule: scheduler_config.json declares dynamic shifting + shift_terminal
#     0.02; the driver policy bakes both and the server uses the σ verbatim.
#   - CFG: guidance_scale 1.0 (no CFG — matches the dancegrpo/mixgrpo recipes).
#     For CFG runs use the official inference strength:
#       sampling.guidance_scale: 4.0
#       sampling.sampler_kwargs: {negative_prompt: " ", return_negative_prompt_embeds: true}
#     (single-space negative — empty "" degenerates after the 34-token chat-template
#     strip and divides the norm-preserving CFG blend by ~0; see QwenImagePipeline.)
#
#   1x8:  bash scripts/run_experiment_single_node.sh diffusion_rl/qwen_image_sglang

num_devices: 8
batch_size: 48                # prompts_per_rollout (matches qwen_image_dancegrpo)
adv_use_global_std: true     # advantage: divide by ONE batch-wide std (v1 parity), not per-group
num_rollouts: 10000

logging:
  report_to_wandb: false        # flip to true to enable wandb (rank-0/driver only)
  project_name: unirl
  run_name: qwen_image_sglang
  entity: null
  tags: ["qwen-image", "dancegrpo", "grpo", "sglang-diffusion", "v2"]

# Shared nodes: model_config + strategy defined once, referenced by
# bundle / pipeline / rollout (the sglang engine needs both at init).
model_config:
  _target_: unirl.models.qwen_image.config.QwenImagePipelineConfig
  pretrained_model_ckpt_path: ${oc.env:QWEN_IMAGE_PATH,Qwen/Qwen-Image}
  model_precision: bf16
  max_sequence_length: 512
  # Static-shift fallback only; the real checkpoint enables dynamic shifting
  # (+ shift_terminal 0.02) via scheduler/scheduler_config.json — and the
  # config's dynamic_shift_overrides carry the same canonical values for
  # HF-repo-id paths.
  shift: 3.0
  # SGLang builds its LoRA ServerArgs from these two fields.
  use_lora: true
  lora_target_modules:
    - attn.add_k_proj
    - attn.add_q_proj
    - attn.add_v_proj
    - attn.to_add_out
    - attn.to_k
    - attn.to_out.0
    - attn.to_q
    - attn.to_v

# Shared SDE strategy; the adapter resolves its sde_label from it.
# DanceGRPO: Dance SDE kernel (the one algorithmic difference from FlowGRPO).
strategy:
  _target_: unirl.sde.kernels.DanceSDEStrategy

bundle:
  _target_: unirl.models.qwen_image.bundle.QwenImageBundle.from_config
  config: ${model_config}

# Trainer-side pipeline (REPLAY recomputes π_old via stage.replay); rollout
# itself runs on the sglang engine below.
pipeline:
  _target_: unirl.models.qwen_image.pipeline.QwenImagePipeline
  shift: 3.0
  autocast_precision: bf16
  trajectory_precision: bf16
  logprob_precision: fp32
  max_sequence_length: 512
  strategy: ${strategy}

backend:
  _target_: unirl.train.backend.fsdp.FSDPBackend
  block_class_names: ["QwenImageTransformerBlock"]
  trainable_attr: transformer
  fsdp_cfg:
    _target_: unirl.train.configs.FSDPConfig
    param_dtype: bf16
    cpu_offload: false
    mixed_precision: true
    fsdp_mode: full
    reshard_after_forward: true
    # Qwen-Image transformer + Qwen2.5-VL text encoder together exceed 96GB
    # per H20 under full-graph replay without AC; v1 uses bf16_full_ac.
    activation_checkpointing: true
    use_torch_compile: false
  optimizer_cfg:
    _target_: unirl.train.backend.base.OptimizerConfig
    learning_rate: 3.0e-4
    adam_beta1: 0.9
    adam_beta2: 0.999
    adam_epsilon: 1.0e-8
    weight_decay: 0.0
  scheduler_cfg:
    _target_: unirl.train.backend.base.LrSchedulerConfig
    type: constant
    warmup_steps: 0
    total_steps: 10000
  lora_cfg:
    _target_: unirl.train.configs.LoraConfig
    rank: 64
    alpha: 128
    dropout: 0.0
    bias: none
    task_type: FEATURE_EXTRACTION
    # JointAttnProcessor naming — image stream (to_q/k/v, to_out.0) plus
    # text stream (add_*_proj, to_add_out). Verified against the diffusers
    # QwenImageTransformer2DModel attention layer; the sglang qwen DiT uses
    # the same names in its non-quantized path, so LoRA wire keys land 1:1.
    target_modules:
      - attn.add_k_proj
      - attn.add_q_proj
      - attn.add_v_proj
      - attn.to_add_out
      - attn.to_k
      - attn.to_out.0
      - attn.to_q
      - attn.to_v

rollout:
  _target_: unirl.rollout.engine.sglang_diffusion.engine.SGLangDiffusionRolloutEngine
  config:
    _target_: unirl.rollout.engine.sglang_diffusion.config.SGLangDiffusionEngineConfig
    model_family: qwen_image
    # Replay consumes the SERVER's fused text embeds (+ masks), so the 8B
    # Qwen2.5-VL's rollout-vs-trainside numeric drift cancels out of the ratio.
    populate_conditions: true
    init_same_noise: ${sampling.init_same_noise}
    # Chunk generate into 16-sample sub-batches so sglang bounds its DiT-forward
    # / VAE-decode peak memory, without shrinking the logical batch.
    forward_batch_size: 16
    num_gpus: 1
    tp_size: 1
    local_mode: true
    target_modules:
      - attn.add_k_proj
      - attn.add_q_proj
      - attn.add_v_proj
      - attn.to_add_out
      - attn.to_k
      - attn.to_out.0
      - attn.to_q
      - attn.to_v
    engine_kwargs:
      # Explicit pipeline pin (ServerArgs.model_id, matched by registered short
      # name "Qwen-Image") — local checkpoint dirs then need no special naming.
      model_id: Qwen-Image
  # The adapter reads ckpt/LoRA off model_config and sde_label off strategy.
  model_config: ${model_config}
  strategy: ${strategy}

reward:
  _target_: unirl.reward.service.RewardService
  backend:
    _target_: unirl.reward.local.pickscore.PickScoreRewardScorer
    base_device: cuda
    config:
      _target_: unirl.reward.local.pickscore.PickScoreSpec
      batch_size: 8
      device: auto
      processor_id: laion/CLIP-ViT-H-14-laion2B-s32B-b79K
      model_id: yuvalkirstain/PickScore_v1

algorithm:
  _target_: unirl.algorithms.flowgrpo.FlowGRPO
  stage_attr: diffusion
  clip_range: 1.0e-4
  clip_schedule: constant
  # REPLAY mode: trainer recomputes the π_old anchor via stage.replay at update
  # time (engine emits trajectories; its native log-probs, if any, are ignored).
  old_logp_source: replay
  conditions_cls:
    _target_: hydra.utils.get_class
    path: unirl.models.qwen_image.conditions.QwenImageConditions
  params: ${sampling}

stack:
  _target_: unirl.train.stack.TrainStack
  micro_batch_size: 1
  max_grad_norm: 1.0
  num_updates_per_batch: 2      # PPO mini-batches per rollout (π_old frozen once); v1 parity

data_source:
  _target_: unirl.data.data_source.MultimodalRLDataSource
  args:
    run:
      data_path: datasets/pickscore/train.txt        # relative to repo cwd (Hydra 1.3 no-chdir)
      eval_data_path: datasets/pickscore/test.txt
      seed: 42
    algorithm:
      prompts_per_rollout: ${batch_size}

sampling:
  _target_: unirl.types.sampling.DiffusionSamplingParams
  num_inference_steps: 12       # qwen_384 preset default
  guidance_scale: 1.0
  height: 384
  width: 384
  eta: 0.7
  samples_per_prompt: 16
  seed: 42
  init_same_noise: false
  autocast_precision: bf16
  scheduler:
    _target_: unirl.utils.scheduler_utils.AllSDEScheduler
    num_timesteps: ${..num_inference_steps}
    num_sde_steps: 3
    # SDE-step window: [0,0.5] confines SDE noise to the early high-σ steps
    # (the validated reproduce setting); [0,1] spreads it across all steps.
    timestep_fraction: [0, 0.5]

weight_sync_interval: 1

sync:
  _target_: unirl.distributed.weight_sync.lora.LocalLoraWeightSync
  verify: false  # SGLang engine lacks loaded_lora_checksums (only loaded_param_checksums); skip read-back
  param_prefix: "transformer."
  adapter_name: default
