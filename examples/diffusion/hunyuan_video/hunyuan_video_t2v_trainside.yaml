# @package _global_
# HunyuanVideo-1.0 T2V GRPO — v2 trainer, in-process (trainside) rollout.
#
# Stack:
#   - rollout engine: TrainsideRolloutEngine (colocated, no separate slab)
#   - backend: FSDPBackend wrapping HunyuanVideoTransformerBlock
#   - LoRA r64 on attn + ff projections
#   - VideoPickScore reward (PickScore on first frame)
# Layout: 1 node × 8 GPUs, all colocated; no weight sync section.
#
# Launch (1 node x 8 GPUs):
#   bash examples/run_experiment_single_node.sh diffusion/hunyuan_video/hunyuan_video_t2v_trainside

num_devices: 8
batch_size: 48                # prompts_per_rollout (v1: 48)
adv_use_global_std: true     # advantage: divide by ONE batch-wide std (v1 parity), not per-group

logging:
  report_to_wandb: true
  project_name: ${oc.env:WANDB_PROJECT,unirl-grpo-t2v}
  run_name: hunyuan_video_t2v_trainside
  entity: ${oc.env:WANDB_ENTITY,null}
  tags: [hunyuan_video, t2v, grpo, trainside, lora-r64, v2]

bundle:
  _target_: unirl.models.hunyuan_video.bundle.HunyuanVideoBundle.from_config
  config:
    _target_: unirl.models.hunyuan_video.config.HunyuanVideoPipelineConfig
    pretrained_model_ckpt_path: ${oc.env:PRETRAINED_MODEL,hunyuanvideo-community/HunyuanVideo}
    model_precision: bf16
    shift: 5.0

pipeline:
  _target_: unirl.models.hunyuan_video.pipeline.HunyuanVideoPipeline
  shift: 5.0
  autocast_precision: bf16
  trajectory_precision: bf16
  logprob_precision: fp32
  strategy:
    _target_: unirl.sde.kernels.FlowSDEStrategy

backend:
  _target_: unirl.train.backend.fsdp.FSDPBackend
  # HV1.0's diffusers transformer has TWO main block stacks: ~20 dual-stream
  # HunyuanVideoTransformerBlock + ~40 single-stream
  # HunyuanVideoSingleTransformerBlock. main's fsdp_wrap only shards + AC-wraps
  # the classes listed here (it does NOT walk diffusers' _no_split_modules
  # like feat's FSDPPolicy did). Listing only the dual-stream block left all
  # 40 single-stream blocks fully replicated per rank with live activations →
  # ~83 GB constant footprint → OOM in attn.to_v LoRA forward regardless of
  # resolution / sps / num_sde_steps (0531j/l/m all died at the same ~83 GB).
  # Match diffusers' _no_split_modules for HunyuanVideoTransformer3DModel;
  # the i2v-only TokenReplace variants are listed for completeness and are
  # simply not enumerated when absent (t2v never instantiates them).
  block_class_names: [
    "HunyuanVideoTransformerBlock",
    "HunyuanVideoSingleTransformerBlock",
    "HunyuanVideoTokenReplaceTransformerBlock",
    "HunyuanVideoTokenReplaceSingleTransformerBlock",
  ]
  trainable_attr: transformer
  fsdp_cfg:
    _target_: unirl.train.configs.FSDPConfig
    param_dtype: bf16
    cpu_offload: false
    mixed_precision: true
    fsdp_mode: full
    reshard_after_forward: true
    activation_checkpointing: true   # HV1.0 transformer is memory-heavy; AC keeps headroom for VAE decode
    use_torch_compile: false
  optimizer_cfg:
    _target_: unirl.train.backend.base.OptimizerConfig
    learning_rate: 3.0e-4
    adam_beta1: 0.9
    adam_beta2: 0.999
    adam_epsilon: 1.0e-8
    weight_decay: 0.0
  scheduler_cfg:
    _target_: unirl.train.backend.base.LrSchedulerConfig
    type: constant
    warmup_steps: 0
    total_steps: 10000
  lora_cfg:
    _target_: unirl.train.configs.LoraConfig
    rank: 64
    alpha: 64
    dropout: 0.0
    bias: none
    task_type: FEATURE_EXTRACTION
    target_modules:
      - attn.to_q
      - attn.to_k
      - attn.to_v
      - attn.to_out.0
      - attn.add_q_proj
      - attn.add_k_proj
      - attn.add_v_proj
      - attn.to_add_out
      - ff.net.0.proj
      - ff.net.2
      - ff_context.net.0.proj
      - ff_context.net.2

rollout:
  _target_: unirl.rollout.engine.trainside.engine.TrainsideRolloutEngine
  stage_attrs: [diffusion]
  # T2V VAE decode is heavy; keep forward groups small.
  forward_batch_size: 1

reward:
  _target_: unirl.reward.service.RewardService
  backend:
    _target_: unirl.reward.local.video_pickscore.VideoPickScoreScorer
    base_device: cuda
    config:
      _target_: unirl.reward.local.video_pickscore.VideoPickScoreSpec
      batch_size: 8
      device: auto
      processor_id: laion/CLIP-ViT-H-14-laion2B-s32B-b79K
      model_id: yuvalkirstain/PickScore_v1

algorithm:
  _target_: unirl.algorithms.flowgrpo.FlowGRPO
  stage_attr: diffusion
  clip_range: 1.0e-4
  clip_schedule: constant
  conditions_cls:
    _target_: hydra.utils.get_class
    path: unirl.models.hunyuan_video.conditions.HunyuanVideoConditions
  params: ${sampling}

stack:
  _target_: unirl.train.stack.TrainStack
  micro_batch_size: 1
  max_grad_norm: 1.0
  # v1 ran num_updates_per_batch=2 (2 PPO mini-batch optimizer steps per
  # rollout, π_old frozen once). Omitting it defaulted to 1 → a single
  # on-policy update where new_logp==old_logp → ratio_mean≡1 and a diluted
  # GRPO signal.
  # per-worker batch = samples_per_prompt(16) * prompts_per_rollout(48) /
  # num_devices(8) = 96; 96 % 2 == 0 → mini-batch 48 (matches v1).
  num_updates_per_batch: 2

data_source:
  _target_: unirl.data.data_source.MultimodalRLDataSource
  # MultimodalRLDataSource.__init__(args) expects a v1-shape cfg with
  # args.run.{data_path,eval_data_path,seed} and
  # args.algorithm.prompts_per_rollout. Wrap these in nested dicts so
  # OmegaConf packs them as a DictConfig that supports attribute access.
  args:
    run:
      data_path: ${oc.env:DATA_PATH}
      eval_data_path: ${oc.env:EVAL_DATA_PATH,${oc.env:DATA_PATH}}
      seed: ${sampling.seed}
    algorithm:
      prompts_per_rollout: ${batch_size}

# Aligned with feat/hunyuan-video-fsdp-training's
# grpo_hunyuan_video_t2v_videopickscore: 20 steps, cfg=1.0, 480×832, eta=0.7,
# shift=5.0; SDE on the first half (8 of the first 10 steps).
sampling:
  _target_: unirl.types.sampling.DiffusionSamplingParams
  num_inference_steps: 20
  guidance_scale: 1.0
  height: 480
  width: 832
  num_frames: 5
  eta: 0.7
  samples_per_prompt: 16
  seed: 42
  init_same_noise: false
  scheduler:
    _target_: unirl.utils.scheduler_utils.AllSDEScheduler
    num_timesteps: ${..num_inference_steps}
    # feat-branch v1 recipe: SDE candidate pool = first half of the schedule
    # (steps 0..9 at T=20), then 8 of those are drawn as the stochastic /
    # trainable steps. Dropping timestep_fraction defaulted the pool to the
    # full [0,20) window AND num_sde_steps=null trained ALL 20 steps — that
    # diluted the GRPO signal (root cause of the flat-reward curves). With
    # num_sde_steps=8 the replay still only holds 8 transformer activations
    # live, so the H20 replay footprint is bounded.
    timestep_fraction: [0.0, 0.5]
    num_sde_steps: 8
