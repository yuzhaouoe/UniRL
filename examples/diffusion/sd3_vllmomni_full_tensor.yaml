# @package _global_
# SD3 v2 trainer — LoRA training, MERGED full-weight sync via tensor-payload (COLOCATE).
# Self-contained variant of sd3_vllmomni.yaml. Differences:
#   - LoRA training (lora_cfg kept), pushed as a MERGED full model each sync —
#     sync.lora_merged: true folds the LoRA delta into the base weights, so the
#     rollout engine runs the merged model with no separate adapter.
#   - sync -> TensorWeightSync (colocate serialized-tensor handoff).

num_devices: 8
batch_size: 48 # prompts_per_rollout
adv_use_global_std: true     # advantage: divide by ONE batch-wide std (v1 parity), not per-group

# Every N rollouts the loop pushes the freshly-trained full weights into the
# engine just before that rollout's generate.
weight_sync_interval: 1

bundle:
  _target_: unirl.models.sd3.bundle.SD3Bundle.from_config
  config:
    _target_: unirl.models.sd3.config.SD3PipelineConfig
    pretrained_model_ckpt_path: ${oc.env:PRETRAINED_MODEL,stabilityai/stable-diffusion-3.5-medium}
    model_precision: bf16
    autocast_precision: bf16
    trajectory_precision: bf16
    logprob_precision: fp32
    shift: 3.0

pipeline:
  _target_: unirl.models.sd3.pipeline.SD3Pipeline
  shift: 3.0
  autocast_precision: bf16
  trajectory_precision: bf16
  logprob_precision: fp32
  strategy:
    _target_: unirl.sde.kernels.FlowSDEStrategy

backend:
  _target_: unirl.train.backend.fsdp.FSDPBackend
  block_class_names: ["JointTransformerBlock"]
  trainable_attr: transformer
  fsdp_cfg:
    _target_: unirl.train.configs.FSDPConfig
    param_dtype: bf16
    cpu_offload: false
    mixed_precision: true
    fsdp_mode: full
    reshard_after_forward: false  # SD3.5-medium is small (~5 GB bf16 full); keep params gathered, skip bwd re-gather
    activation_checkpointing: false
    use_torch_compile: false
  optimizer_cfg:
    _target_: unirl.train.backend.base.OptimizerConfig
    learning_rate: 3.0e-4
    adam_beta1: 0.9
    adam_beta2: 0.999
    adam_epsilon: 1.0e-8
    weight_decay: 0.0
  scheduler_cfg:
    _target_: unirl.train.backend.base.LrSchedulerConfig
    type: constant
    warmup_steps: 0
    total_steps: 10000
  # LoRA training — synced as a MERGED full model (sync.lora_merged: true), so the
  # rollout engine runs the merged weights without a separate adapter.
  lora_cfg:
    _target_: unirl.train.configs.LoraConfig
    rank: 32
    alpha: 64
    dropout: 0.0
    bias: none
    task_type: FEATURE_EXTRACTION
    target_modules:
      - attn.add_k_proj
      - attn.add_q_proj
      - attn.add_v_proj
      - attn.to_add_out
      - attn.to_k
      - attn.to_out.0
      - attn.to_q
      - attn.to_v

rollout:
  _target_: unirl.rollout.engine.vllm_omni.engine.VLLMOmniRolloutEngine
  model_config: ${bundle.config}
  config:
    _target_: unirl.rollout.engine.vllm_omni.config.VLLMOmniEngineConfig
    model_path: ${oc.env:PRETRAINED_MODEL,stabilityai/stable-diffusion-3.5-medium}
    modality: sd35_t2i
    default_height: 512
    default_width: 512
    default_num_inference_steps: 10
    default_guidance_scale: 1.0
    default_eta: 0.7
    enable_sleep_mode: true # colocate: train + rollout time-share the GPU

reward:
  _target_: unirl.reward.service.RewardService
  backend:
    _target_: unirl.reward.local.pickscore.PickScoreRewardScorer
    base_device: cuda
    config:
      _target_: unirl.reward.local.pickscore.PickScoreSpec
      batch_size: 8
      device: auto
      processor_id: laion/CLIP-ViT-H-14-laion2B-s32B-b79K
      model_id: yuvalkirstain/PickScore_v1

algorithm:
  _target_: unirl.algorithms.flowgrpo.FlowGRPO
  stage_attr: diffusion
  clip_range: 1.0e-4
  clip_schedule: constant
  conditions_cls:
    _target_: hydra.utils.get_class
    path: unirl.models.sd3.conditions.SD3Conditions
  params: ${sampling}

stack:
  _target_: unirl.train.stack.TrainStack
  micro_batch_size: 1
  max_grad_norm: 1.0
  num_updates_per_batch: 2      # PPO mini-batches per rollout (π_old frozen once); v1 parity

data_source:
  # Real prompts loaded from file: MultimodalRLDataSource reads TXT/JSON/JSONL
  # via data_path and exposes get_samples(bs). (DefaultDataSource returns only
  # 8 hardcoded prompts — smoke-test use; training on it over-optimizes/collapses.)
  _target_: unirl.data.data_source.MultimodalRLDataSource
  args:
    run:
      data_path: datasets/pickscore/train.txt        # relative to repo cwd (Hydra 1.3 no-chdir)
      eval_data_path: datasets/pickscore/test.txt
      seed: 42
    algorithm:
      prompts_per_rollout: ${batch_size}

sampling:
  _target_: unirl.types.sampling.DiffusionSamplingParams
  num_inference_steps: 10
  guidance_scale: 1.0
  height: 512
  width: 512
  eta: 0.7
  samples_per_prompt: 16
  seed: 42
  init_same_noise: false
  autocast_precision: bf16
  trajectory_precision: bf16
  logprob_precision: fp32
  scheduler:
    _target_: unirl.utils.scheduler_utils.AllSDEScheduler
    num_timesteps: ${..num_inference_steps}
    num_sde_steps: 3
    # SDE-step window: [0,0.5] confines SDE noise to the early high-σ steps
    # (the validated reproduce setting); [0,1] spreads it across all steps.
    timestep_fraction: [0, 0.5]

# LoRA → merged full-weight sync → vLLM-Omni rollout (colocate tensor-payload).
sync:
  _target_: unirl.distributed.weight_sync.full.tensor.TensorWeightSync
  # Fold the trained LoRA delta into the base weights and push the merged full
  # model (we LoRA-train but serve a merged model — no separate adapter).
  lora_merged: true
  bucket_size_mb: 512
  flush_cache: true
  # Ordered first-match-wins name rewrite (see FullWeightSync._apply_name_remap):
  # backend.model is the bare SD3 transformer, so the "*" catch-all nests every
  # key under the receiver's transformer.* namespace. Applied on both the merged
  # (lora_merged=true) and raw paths.
  name_remap: {"*": "transformer.*"}
