# @package _global_
# GRPO Qwen2.5-VL on Geometry3K-MC — train_ar (ARTrainer)
# with the SGLang LLM rollout engine (colocate) + LoRA-POOL weight sync.
#
# Third path alongside:
#   - qwen_vl_grpo_geo3k_mc_sglang_4x8.yaml  (sglang + FULL-weight TensorWeightSync)
#   - qwen_vl_grpo_geo3k_mc_4x8_lora.yaml    (trainside + LoRA, no sync)
# Here the LLM decoder is trained as a rank-16 LoRA adapter and pushed into the
# colocated SRT server's versioned LoRA pool each rollout via LocalLoraWeightSync
# (set_lora_from_tensors -> /load_lora_adapter_from_tensors, {name}_v{N}).
#
# Data prep + paths: same as qwen_vl_grpo_geo3k_mc_4x8.yaml — build the local
# jsonl once with `python -m unirl.utils.prepare_geo3k_mc --out-dir data/geo3k_mc`,
# then set DATA_PATH=data/geo3k_mc/train.jsonl (QWEN_VL_PATH defaults to the HF id).

num_devices: 32
batch_size: 32

num_rollouts: 2000
weight_sync_interval: 1 # push the trained LoRA adapter into SGLang every rollout

adv_normalization_scope: global

logging:
  report_to_wandb: true
  project_name: unirl-flowgrpo-newstac
  run_name: qwen_vl_grpo_sglang_lora_4x8
  entity: ${oc.env:WANDB_ENTITY,null}
  tags: [grpo, qwen-vl, geo3k-mc, sglang, lora, colocate, 4x8]

bundle:
  _target_: unirl.models.qwen_vl.bundle.QwenVLBundle.from_config
  config:
    _target_: unirl.models.qwen_vl.config.QwenVLPipelineConfig
    pretrained_model_ckpt_path: ${oc.env:QWEN_VL_PATH,Qwen/Qwen2.5-VL-7B-Instruct}
    model_precision: bf16
    freeze_vision_tower: true
    use_gradient_checkpointing: true
    max_prompt_length: 2048

pipeline:
  _target_: unirl.models.qwen_vl.pipeline.QwenVLPipeline.from_bundle
  max_prompt_length: 2048

backend:
  _target_: unirl.train.backend.fsdp.FSDPBackend
  block_class_names: ["Qwen2_5_VLDecoderLayer"]
  trainable_attr: transformer
  fsdp_cfg:
    _target_: unirl.train.configs.FSDPConfig
    param_dtype: bf16
    cpu_offload: false
    mixed_precision: true
    fsdp_mode: full
    reshard_after_forward: true
    activation_checkpointing: false
    use_torch_compile: false
  optimizer_cfg:
    _target_: unirl.train.backend.base.OptimizerConfig
    # LoRA LR (1e-4) — ~20x the full-FT 5e-6. At 5e-6 the LoRA adapter (lora_B=0
    # init) barely moves and reward stays flat at the base; 1e-4 makes the policy
    # actually move (approx_kl 1e-13->1e-5).
    learning_rate: 1.0e-4
    adam_beta1: 0.9
    adam_beta2: 0.999
    adam_epsilon: 1.0e-8
    weight_decay: 0.0
  scheduler_cfg:
    _target_: unirl.train.backend.base.LrSchedulerConfig
    type: constant
    warmup_steps: 0
    total_steps: 2000
  lora_cfg:
    _target_: unirl.train.configs.LoraConfig
    rank: 16
    alpha: 32
    dropout: 0.0
    bias: none
    task_type: CAUSAL_LM
    target_modules:
      - q_proj
      - k_proj
      - v_proj
      - o_proj

rollout:
  _target_: unirl.rollout.engine.sglang_llm.engine.SGLangLLMRolloutEngine
  config:
    _target_: unirl.rollout.engine.sglang_llm.config.SGLangLLMEngineConfig
    pretrained_model_ckpt_path: ${oc.env:QWEN_VL_PATH,Qwen/Qwen2.5-VL-7B-Instruct}
    tp_size: 1
    samples_pre_expanded: true
    image_token: "<|vision_start|><|image_pad|><|vision_end|>"
    max_new_tokens: 512
    temperature: 0.7
    top_p: 0.9
    concurrency: 8
    engine_kwargs:
      mem_fraction_static: 0.3
      skip_server_warmup: true
      disable_cuda_graph: true
      # LoRA-pool sync. NOTE for Qwen2.5-VL: route LoRA through the triton
      # backend (lora_backend), but KEEP the default fa3 multimodal attention —
      # attention_backend=triton crashes the SRT server on Qwen2.5-VL (triton
      # attn is incompatible with the VL vision/multimodal path). (Qwen3 text-only
      # used attention_backend=triton; VL must use lora_backend instead.)
      enable_lora: true
      max_lora_rank: 16
      lora_target_modules: [q_proj, k_proj, v_proj, o_proj]
      lora_backend: triton
      max_loaded_loras: 8

# LoRA-pool weight sync: serialize the trained LoRA adapter tensors and load
# them into the colocated SRT server as a fresh versioned adapter each rollout.
sync:
  _target_: unirl.distributed.weight_sync.lora.LocalLoraWeightSync
  param_prefix: ""
  adapter_name: default
  verify: false

reward:
  _target_: unirl.reward.service.RewardService
  backend:
    _target_: unirl.reward.local.mc_exact_match.MCExactMatchRewardScorer
    base_device: cpu
    config:
      _target_: unirl.reward.local.mc_exact_match.MCExactMatchSpec

algorithm:
  _target_: unirl.algorithms.grpo.GRPO
  stage_attr: ar
  clip_range: 1.0e-2
  clip_schedule: constant
  conditions_cls:
    _target_: hydra.utils.get_class
    path: unirl.models.qwen_vl.conditions.QwenVLARConditions
  sampling_temperature: 0.7

stack:
  _target_: unirl.train.stack.TrainStack
  micro_batch_size: 2
  max_grad_norm: 1.0

data_source:
  _target_: unirl.data.data_source.MultimodalRLDataSource
  args:
    run:
      data_path: ${oc.env:DATA_PATH}            # local jsonl; build with unirl/utils/prepare_geo3k_mc.py
      eval_data_path: ${oc.env:EVAL_DATA_PATH,${oc.env:DATA_PATH}}
      seed: 42
    algorithm:
      prompts_per_rollout: 32

sampling:
  _target_: unirl.types.sampling.ARSamplingParams
  samples_per_prompt: 16
  temperature: 0.7
  top_p: 0.9
  top_k: 1024
  max_new_tokens: 512
