# @package _global_
# Validation run: BAGEL-7B-MoT LoRA flow-matching T2I SFT on naruto-blip-captions.
#
# Launch (1×8):
#   ENTRY=train_sft bash examples/run_experiment_single_node.sh sft/validation/bagel_sft_lora

num_devices: 8
batch_size: 16
num_steps: 1500
eval_interval: 0
eval_batch_size: 8
eval_num_samples: -1
save_interval: 300
save_dir: ${oc.env:SFT_SAVE_DIR,checkpoints/sft_bagel}
save_mode: auto
transport_kind: colocate_store
workers_per_device: 1

logging:
  report_to_wandb: ${oc.decode:${oc.env:REPORT_TO_WANDB,true}}
  project_name: ${oc.env:WANDB_PROJECT,unirl-sft-validation}
  run_name: ${oc.env:WANDB_RUN_NAME,bagel-lora-naruto}
  entity: ${oc.env:WANDB_ENTITY,null}
  tags: [sft, bagel, unified-model, lora, validation]

bundle:
  _target_: unirl.models.bagel.bundle.BagelBundle.from_config
  config:
    _target_: unirl.models.bagel.config.BagelPipelineConfig
    pretrained_model_ckpt_path: ${oc.env:BAGEL_PATH,ByteDance-Seed/BAGEL-7B-MoT}
    model_precision: bf16
    shift: 3.0
    use_lora: true

pipeline:
  _target_: unirl.models.bagel.pipeline.BagelPipeline
  autocast_precision: bf16
  trajectory_precision: fp32
  logprob_precision: fp32
  shift: 3.0
  strategy:
    _target_: unirl.sde.kernels.FlowSDEStrategy

backend:
  _target_: unirl.train.backend.fsdp.FSDPBackend
  block_class_names: ["Qwen2MoTDecoderLayer"]
  trainable_attr: transformer
  fsdp_cfg:
    _target_: unirl.train.configs.FSDPConfig
    param_dtype: bf16
    cpu_offload: false
    mixed_precision: true
    fsdp_mode: full
    reshard_after_forward: true
    activation_checkpointing: true
    use_torch_compile: false
    root_wrap: false
  optimizer_cfg:
    _target_: unirl.train.backend.base.OptimizerConfig
    learning_rate: 1.0e-4
    adam_beta1: 0.9
    adam_beta2: 0.999
    adam_epsilon: 1.0e-8
    weight_decay: 1.0e-4
  scheduler_cfg:
    _target_: unirl.train.backend.base.LrSchedulerConfig
    type: constant
    warmup_steps: 0
    total_steps: ${num_steps}
  lora_cfg:
    _target_: unirl.train.configs.LoraConfig
    rank: 64
    alpha: 128
    dropout: 0.0
    bias: none
    task_type: FEATURE_EXTRACTION
    target_modules:
      - self_attn.q_proj_moe_gen
      - self_attn.k_proj_moe_gen
      - self_attn.v_proj_moe_gen
      - self_attn.o_proj_moe_gen
      - mlp_moe_gen.gate_proj
      - mlp_moe_gen.up_proj
      - mlp_moe_gen.down_proj

algorithm:
  _target_: unirl.algorithms.sft.FlowMatchSFT
  stage_attr: diffusion
  timestep_sampling: logit_normal
  timestep_shift: 3.0
  conditions_cls:
    _target_: hydra.utils.get_class
    path: unirl.models.bagel.conditions.BagelDiffusionConditions
  params: ${sampling}

stack:
  _target_: unirl.train.stack.TrainStack
  micro_batch_size: 1
  max_grad_norm: 1.0

track_builder:
  _target_: unirl.train.sft.track_builder.DiffusionSupervisedTrackBuilder
  height: 512
  width: 512
  guidance_scale: 1.0

data_source:
  _target_: unirl.data.sft.SupervisedDataSource
  manifest_path: ${oc.env:SFT_DATA}
  eval_manifest_path: ${oc.env:SFT_EVAL_DATA,${oc.env:SFT_DATA}}
  seed: 42

sampling:
  _target_: unirl.models.bagel.diffusion.BagelDiffusionParams
  num_inference_steps: 14
  guidance_scale: 1.0
  cfg_text_scale: 1.0
  cfg_img_scale: 1.0
  height: 512
  width: 512
