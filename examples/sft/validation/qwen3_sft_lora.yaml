# @package _global_
# Validation run: Qwen3-8B LoRA SFT on alpaca-cleaned (~20k rows, ~3 epochs).
#
# Launch (1×8):
#   ENTRY=train_sft bash examples/run_experiment_single_node.sh sft/validation/qwen3_sft_lora

num_devices: 8
batch_size: 64
num_steps: 1000
eval_interval: 50
eval_batch_size: 16
eval_num_samples: -1
save_interval: 200
save_dir: ${oc.env:SFT_SAVE_DIR,checkpoints/sft_qwen3}
save_mode: auto

logging:
  report_to_wandb: ${oc.decode:${oc.env:REPORT_TO_WANDB,true}}
  project_name: ${oc.env:WANDB_PROJECT,unirl-sft-validation}
  run_name: ${oc.env:WANDB_RUN_NAME,qwen3-8b-lora-alpaca}
  entity: ${oc.env:WANDB_ENTITY,null}
  tags: [sft, qwen3, llm, lora, validation]

bundle:
  _target_: unirl.models.qwen3.bundle.Qwen3Bundle.from_config
  config:
    _target_: unirl.models.qwen3.config.Qwen3PipelineConfig
    pretrained_model_ckpt_path: ${oc.env:QWEN3_PATH,Qwen/Qwen3-8B}
    model_precision: fp32
    use_gradient_checkpointing: true
    attn_implementation: flex_attention

pipeline:
  _target_: unirl.models.qwen3.pipeline.Qwen3Pipeline.from_bundle
  enable_thinking: false
  autocast_precision: bf16
  logprob_precision: fp32

backend:
  _target_: unirl.train.backend.fsdp.FSDPBackend
  block_class_names: ["Qwen3DecoderLayer"]
  trainable_attr: transformer
  fsdp_cfg:
    _target_: unirl.train.configs.FSDPConfig
    param_dtype: bf16
    cpu_offload: false
    mixed_precision: true
    fsdp_mode: full
    reshard_after_forward: true
    activation_checkpointing: true
    use_torch_compile: false
  optimizer_cfg:
    _target_: unirl.train.backend.base.OptimizerConfig
    learning_rate: 1.0e-4
    adam_beta1: 0.9
    adam_beta2: 0.999
    adam_epsilon: 1.0e-8
    weight_decay: 0.0
  scheduler_cfg:
    _target_: unirl.train.backend.base.LrSchedulerConfig
    type: cosine
    warmup_steps: 20
    total_steps: ${num_steps}
  lora_cfg:
    _target_: unirl.train.configs.LoraConfig
    rank: 32
    alpha: 64
    dropout: 0.0
    bias: none
    task_type: CAUSAL_LM
    target_modules:
      - q_proj
      - k_proj
      - v_proj
      - o_proj

algorithm:
  _target_: unirl.algorithms.sft.SFT
  stage_attr: ar
  loss_agg_mode: token-mean
  conditions_cls:
    _target_: hydra.utils.get_class
    path: unirl.models.qwen3.conditions.Qwen3ARConditions

stack:
  _target_: unirl.train.stack.TrainStack
  micro_batch_size: 2
  max_grad_norm: 1.0

track_builder:
  _target_: unirl.train.sft.track_builder.ARSupervisedTrackBuilder
  max_response_length: 2048

data_source:
  _target_: unirl.data.sft.SupervisedDataSource
  manifest_path: ${oc.env:SFT_DATA}
  eval_manifest_path: ${oc.env:SFT_EVAL_DATA,${oc.env:SFT_DATA}}
  seed: 42
