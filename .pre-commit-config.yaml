default_stages: [pre-commit, pre-push, manual]

# Vendored sub-trees excluded from this repo's hooks (own tooling and/or upstream code
# that must stay byte-pristine so it can be re-vendored cleanly):
#   - unirl-reward-service/ : vendored standalone sub-project (own pyproject + lint/test
#     tooling); its upstream model code carries semantically-meaningful trailing
#     whitespace (VideoAlign prompt templates) the whitespace/format hooks must not rewrite.
#   - unirl/models/bagel/vendor/ : pristine official ByteDance-Seed/Bagel modeling
#     (see VENDOR_COMMIT.txt); kept byte-identical to upstream, so the whitespace/format
#     hooks must not rewrite it either.
#   - benchmarks/*/*/data/ : vendored upstream benchmark prompt sets (GenEval,
#     PartiPrompts, VBench, ...); kept byte-identical so upstream checksums verify.
exclude: ^(unirl-reward-service/|unirl/models/bagel/vendor/|benchmarks/[^/]+/[^/]+/data/)

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-yaml
        args: [--allow-multiple-documents]
      - id: check-toml
      - id: check-ast
      - id: check-case-conflict
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ['--maxkb=2500']
      - id: check-shebang-scripts-are-executable
      - id: detect-private-key
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: debug-statements
      - id: requirements-txt-fixer
      - id: no-commit-to-branch

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.1
    hooks:
      - id: ruff-check
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      # Static guard that every recipe `_target_` still resolves to a real symbol,
      # so a rename can't leave a dead Hydra path to fail only at launch time.
      - id: check-recipe-targets
        name: recipe _target_ paths resolve
        entry: python scripts/check_recipe_targets.py
        language: python
        pass_filenames: false
        always_run: true
