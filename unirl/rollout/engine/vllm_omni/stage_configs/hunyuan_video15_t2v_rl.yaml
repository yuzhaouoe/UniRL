# Single-stage HunyuanVideo-1.5 text-to-video config for RL rollout.
#
# Diff vs SD3.5 stage config:
#   - Same single-stage diffusion architecture (no AR prelude — HV1.5 is pure
#     generative text-to-video, not multi-modal like HunyuanImage-3).
#   - custom_pipeline_args installs our RLHunyuanVideo15Pipeline subclass
#     so SDE-mode rollouts get trajectory capture (latents, sigmas, log_probs)
#     and dual-text-encoder condition extraction (text_mllm + text_glyph).
#   - worker_extension_cls installs DiTWeightSyncExtension (same as SD3,
#     reused for HV1.5 DiT backbone).
#   - Dual-text-encoder condition fields (Qwen2.5-VL MLLM + ByT5 glyph)
#     are captured by the pipeline subclass and routed via custom_output dict
#     for the response handler to unpack into HunyuanVideo15Conditions.
#
# Sized for HunyuanVideo-1.5 on TP=1. Single-GPU rollout matches the trainer's
# full-forward math more closely than tensor-parallel rollout.

stage_args:
  - stage_id: 0
    stage_type: diffusion
    runtime:
      process: true
      devices: "0"
      max_batch_size: 4
    engine_args:
      model_stage: diffusion
      enforce_eager: true
      distributed_executor_backend: "mp"
      vae_use_slicing: false
      vae_use_tiling: false
      cache_backend: null
      cache_config: null
      enable_cache_dit_summary: false
      # Required for vLLM to wrap DiT Linear modules in LoRA-aware variants.
      # Without ``enable_lora``, ``add_lora`` still registers the adapter in
      # ``DiffusionLoRAManager._registered_adapters`` (so checksum probes
      # pass), but no Linear consults it and the forward silently runs base
      # weights. ``max_lora_rank`` must be >= the recipe's LoRAPolicy rank;
      # the vllm.config.lora default of 16 silently rejects larger adapters
      # at add time.
      enable_lora: true
      max_lora_rank: 64
      parallel_config:
        pipeline_parallel_size: 1
        data_parallel_size: 1
        tensor_parallel_size: 1
        enable_expert_parallel: false
        sequence_parallel_size: 1
        ulysses_degree: 1
        ring_degree: 1
        cfg_parallel_size: 1
        vae_patch_parallel_size: 1
        use_hsdp: false
        hsdp_shard_size: -1
        hsdp_replicate_size: 1
      # unirl-specific: install RLHunyuanVideo15Pipeline so SDE-mode
      # rollouts get a swappable scheduler, per-step trajectory capture
      # (latents, sigmas, log_probs), and dual-text-encoder condition
      # extraction (text_mllm + text_glyph from the dual-encoder architecture).
      custom_pipeline_args:
        pipeline_class: unirl.rollout.engine.vllm_omni.pipelines.hv15.pipeline.RLHunyuanVideo15Pipeline
      # unirl-specific: install the weight-sync extension so the DiT
      # worker exposes update_weights_from_ipc (bucketed CUDA-IPC) and
      # later init_weight_transfer_engine / update_weights (NCCL).
      # Must coexist with the custom pipeline above; vllm-omni's worker
      # composes these via multiple inheritance at instantiation time.
      worker_extension_cls: unirl.rollout.engine.vllm_omni.worker.dit_extension.DiTWeightSyncExtension
    final_output: true
    final_output_type: video

runtime:
  enabled: true
  defaults:
    window_size: -1
    max_inflight: 1
