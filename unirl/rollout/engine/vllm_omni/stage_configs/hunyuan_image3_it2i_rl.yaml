# RL-aware copy of upstream hunyuan_image3_it2i.yaml.
# Diff vs upstream:
#   1. Stage 0 final_output: true (was false). Surfaces the AR text + per-token
#      logp our ar_capture.py reads to build tracks["ar"].segment. The KV transfer
#      to Stage 1 is independent of this flag, so the AR→DiT bridge is
#      unaffected.
#   2. Stage 1 engine_args.custom_pipeline_args injected to install our
#      RLHunyuanImage3Pipeline subclass (scheduler swap + trajectory drain
#      for SDE-mode rollouts).

stage_args:
  - stage_id: 0
    stage_type: llm
    runtime:
      process: true
      devices: "0,1,2,3"
      max_batch_size: 1
      requires_multimodal_data: true
    engine_args:
      model_stage: AR
      model_arch: HunyuanImage3ForCausalMM
      worker_cls: vllm_omni.worker.gpu_ar_worker.GPUARWorker
      scheduler_cls: vllm_omni.core.sched.omni_ar_scheduler.OmniARScheduler
      # See t2i YAML for rationale; same tokenizer patch + weight-sync mixin.
      worker_extension_cls: unirl.rollout.engine.vllm_omni.weight_sync.ar_extension.HI3ARWeightSyncExtension
      # Enable LoRA on the AR stage; mirrors the t2i YAML.
      enable_lora: true
      gpu_memory_utilization: 0.95
      enforce_eager: true
      trust_remote_code: true
      engine_output_type: latent
      enable_prefix_caching: false
      max_num_batched_tokens: 32768
      tensor_parallel_size: 4
      pipeline_parallel_size: 1
      hf_overrides:
        rope_parameters:
          mrope_section: [0, 32, 32]
          rope_type: default
    is_comprehension: false
    # unirl-specific: was `false` upstream — flipped so AR tokens +
    # per-token logp surface to the orchestrator's caller for RL.
    final_output: true
    final_output_type: text
    default_sampling_params:
      temperature: 0.6
      top_p: 0.95
      top_k: 1024
      max_tokens: 4096
      stop_token_ids: [127957]
      detokenize: true

  - stage_id: 1
    stage_type: diffusion
    runtime:
      process: true
      devices: "4,5,6,7"
      max_batch_size: 1
      requires_multimodal_data: true
    engine_args:
      model_stage: dit
      model_arch: HunyuanImage3ForCausalMM
      enforce_eager: true
      trust_remote_code: true
      distributed_executor_backend: "mp"
      parallel_config:
        tensor_parallel_size: 4
        enable_expert_parallel: true
      # unirl-specific: install RLHunyuanImage3Pipeline.
      custom_pipeline_args:
        pipeline_class: unirl.rollout.engine.vllm_omni.hi3.pipeline.RLHunyuanImage3Pipeline
      # unirl-specific: install the weight-sync extension on the DiT
      # worker (mirrors t2i YAML — see that file for rationale).
      worker_extension_cls: unirl.rollout.engine.vllm_omni.weight_sync.dit_extension.DiTWeightSyncExtension
    engine_input_source: [0]
    custom_process_input_func: vllm_omni.model_executor.stage_input_processors.hunyuan_image3.ar2diffusion
    final_output: true
    final_output_type: image
    default_sampling_params:
      num_inference_steps: 50
      guidance_scale: 2.5

runtime:
  enabled: true
  edges:
    - from: 0
      to: 1
