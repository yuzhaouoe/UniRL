# DiT-ONLY stage config (two-engine v2 trainer) — critical gotcha.
#
# A single standalone diffusion stage that consumes an EXTERNAL recaption as
# cot_text (injected per-prompt via extra["ar_generated_text"] by request.py's
# dit_recaption branch) and renders M images at distinct noise. No AR stage,
# no KV transfer — the DiT pipeline self-prefills the text context from
# prompt + cot_text (RLHunyuanImage3Pipeline.forward → upstream forward →
# prepare_model_inputs(mode="gen_image")).
#
# Base = upstream hunyuan_image3_t2i.yaml, the ONLY HI3 DiT config verified
# standalone (single diffusion stage, 4x H20): enable_expert_parallel:true,
# need_recv_cache:true (no upstream edge feeds it, so it self-prefills — same
# as the verified standalone). Plus our RL bits from t2i_rl.yaml's DiT stage:
#   - custom_pipeline_args → RLHunyuanImage3Pipeline (SDE scheduler swap +
#     dense trajectory capture + fused_mm_capture for DiffusionGRPO replay).
#   - worker_extension_cls → DiTWeightSyncExtension (LoRA receive target).
#   - vae_use_slicing/tiling:false, cache_*:null (trajectory-capture parity).
#
# Devices 4-7 (DiT engine half of the 8-GPU colocate pool); AR engine
# (hunyuan_image3_ar_recaption_rl.yaml) takes 0-3.

stage_args:
  - stage_id: 0
    stage_type: diffusion
    runtime:
      devices: "4,5,6,7"
      max_batch_size: 1
    engine_args:
      max_num_seqs: 1
      model_stage: dit
      # Colocate-memory trim: lower the DiT engine's resident/slept footprint on
      # GPU 4-7 so the FSDP backward has more room (mirrors the AR stage trim).
      gpu_memory_utilization: 0.7
      enforce_eager: true
      trust_remote_code: true
      distributed_executor_backend: "mp"
      vae_use_slicing: false
      vae_use_tiling: false
      cache_backend: null
      cache_config: null
      enable_cache_dit_summary: false
      # No upstream sender; the recv side is set up but no transfer arrives,
      # so the pipeline prefills its own text context (matches the verified
      # standalone upstream t2i.yaml, which is also need_recv_cache:true with
      # no edge feeding it).
      omni_kv_config:
        need_recv_cache: true
      parallel_config:
        tensor_parallel_size: 4
        enable_expert_parallel: true
      # RL pipeline subclass: SDE scheduler + per-step trajectory + fused_mm
      # capture (DiffusionGRPO replay needs conditions["fused"]).
      custom_pipeline_args:
        pipeline_class: unirl.rollout.engine.vllm_omni.pipelines.hi3.pipeline.RLHunyuanImage3Pipeline
      # Weight-sync extension: DiT worker exposes update_weights_from_ipc /
      # the LoRA receive path so set_lora_from_tensors lands the adapter.
      worker_extension_cls: unirl.rollout.engine.vllm_omni.worker.dit_extension.DiTWeightSyncExtension
    final_output: true
    final_output_type: image
    is_comprehension: false
    # No default seed on purpose. Per-image distinct seeds are set by the engine
    # (one generate() per prompt, seed = seed_from_sample_id) — NOT here and NOT
    # via the request's sampling params. A fixed default (e.g. seed:42) here, OR
    # relying on vllm-omni's random-seed fallback, makes every per-recaption
    # request share ONE seed → byte-identical images → diffusion advantage 0.
    # See engine.seed_from_sample_id / request._to_omni_dit_recaption.

runtime:
  enabled: true
